<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>営業進捗管理システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS Variables & Reset — 見積管理システムと共通デザイン
============================================================ */
:root{
  --sidebar-w:240px; --sidebar-collapsed-w:60px; --sidebar-bg:#0f1729;
  --sidebar-hover:rgba(255,255,255,0.07); --sidebar-active:rgba(74,144,226,0.18);
  --sidebar-active-bar:#4a90e2; --sidebar-text:rgba(255,255,255,0.65);
  --sidebar-text-active:#fff; --sidebar-text-sub:rgba(255,255,255,0.35);
  --sidebar-border:rgba(255,255,255,0.06); --sidebar-logo-bg:#0a1020;
  --bg:#f4f6fb; --card:#ffffff; --border:#e8eaed; --border-light:#f0f2f5;
  --primary:#2563eb; --primary-light:#eff6ff; --primary-dark:#1d4ed8;
  --success:#16a34a; --danger:#dc2626; --warning:#d97706; --info:#0891b2;
  --text:#1e293b; --text-sub:#64748b; --text-muted:#94a3b8;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 12px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
  --shadow-lg:0 10px 30px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
  --radius:10px; --radius-sm:6px; --radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;}
button,input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#c5cdd9;border-radius:3px;}

/* ── Shell ── */
#app-shell{display:flex;height:100vh;overflow:hidden;}

/* ── Sidebar ── */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--sidebar-bg);display:flex;flex-direction:column;
  height:100vh;position:relative;transition:width .25s,min-width .25s;
  z-index:100;overflow:hidden;
}
#sidebar.collapsed{width:var(--sidebar-collapsed-w);min-width:var(--sidebar-collapsed-w);}
.sidebar-logo{
  display:flex;align-items:center;gap:10px;padding:18px 16px 16px;
  border-bottom:1px solid var(--sidebar-border);background:var(--sidebar-logo-bg);
  flex-shrink:0;min-height:64px;cursor:pointer;user-select:none;
}
.sidebar-logo-icon{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,#4a90e2,#2563eb);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;box-shadow:0 2px 8px rgba(74,144,226,.4);
}
.sidebar-logo-text{display:flex;flex-direction:column;overflow:hidden;transition:opacity .2s,width .2s;white-space:nowrap;}
.sidebar-logo-title{font-size:13px;font-weight:700;color:#fff;letter-spacing:.02em;line-height:1.2;}
.sidebar-logo-sub{font-size:10px;color:var(--sidebar-text-sub);margin-top:1px;}
#sidebar.collapsed .sidebar-logo-text{opacity:0;width:0;overflow:hidden;}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;}
.sidebar-section-label{
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--sidebar-text-sub);padding:14px 18px 5px;white-space:nowrap;transition:opacity .2s;
}
#sidebar.collapsed .sidebar-section-label{opacity:0;pointer-events:none;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 14px 9px 16px;
  margin:1px 8px;border-radius:var(--radius-sm);cursor:pointer;
  color:var(--sidebar-text);font-size:12.5px;font-weight:500;
  transition:all .15s;text-decoration:none;position:relative;white-space:nowrap;user-select:none;
}
.nav-item:hover{background:var(--sidebar-hover);color:var(--sidebar-text-active);}
.nav-item.active{background:var(--sidebar-active);color:var(--sidebar-text-active);}
.nav-item.active::before{
  content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);
  width:3px;height:20px;background:var(--sidebar-active-bar);border-radius:0 3px 3px 0;
}
.nav-item-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;line-height:1;}
.nav-item-label{flex:1;transition:opacity .2s;overflow:hidden;}
.nav-badge{
  background:var(--danger);color:#fff;border-radius:10px;
  font-size:10px;font-weight:700;padding:1px 6px;flex-shrink:0;
}
#sidebar.collapsed .nav-item-label,.nav-badge-wrap{transition:opacity .2s;}
#sidebar.collapsed .nav-badge-wrap{opacity:0;width:0;overflow:hidden;}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--sidebar-border);flex-shrink:0;}
.sidebar-toggle{
  position:absolute;top:20px;right:-12px;width:24px;height:24px;
  background:var(--card);border:1px solid var(--border);border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--text-sub);box-shadow:var(--shadow-sm);z-index:101;transition:transform .25s;
}
.sidebar-toggle:hover{box-shadow:var(--shadow);color:var(--primary);}
#sidebar.collapsed .sidebar-toggle{transform:rotate(180deg);}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0;}
#topbar{
  height:56px;background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:16px;
  flex-shrink:0;position:sticky;top:0;z-index:50;
}
.topbar-title{font-size:15px;font-weight:700;color:var(--text);}
.topbar-sub{font-size:11px;color:var(--text-sub);}
.topbar-spacer{flex:1;}
.topbar-actions{display:flex;align-items:center;gap:8px;}
.topbar-alert{
  display:flex;align-items:center;gap:6px;padding:5px 12px;
  background:#fef2f2;border:1px solid #fecaca;border-radius:var(--radius-sm);
  color:var(--danger);font-size:11px;font-weight:600;
}

/* ── Content ── */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px;}
.page{display:none;animation:fadeSlideIn .2s ease-out;}
.page.active{display:block;}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ── Cards ── */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px;}
.summary-card{
  background:var(--card);border-radius:var(--radius);padding:18px 20px;
  box-shadow:var(--shadow-sm);border:1px solid var(--border-light);
  transition:box-shadow .2s,transform .2s;
}
.summary-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.summary-card .lbl{font-size:11px;color:var(--text-sub);margin-bottom:4px;font-weight:500;}
.summary-card .val{font-size:26px;font-weight:700;}
.summary-card .sub{font-size:11px;color:var(--text-muted);margin-top:3px;}
.c-blue{color:var(--primary);} .c-red{color:var(--danger);} .c-green{color:var(--success);} .c-yellow{color:var(--warning);}

/* ── Page heading ── */
.page-heading{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.page-heading h2{font-size:18px;font-weight:700;}
.page-heading p{font-size:12px;color:var(--text-sub);margin-top:3px;}

/* ── Table card ── */
.table-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;border:1px solid var(--border-light);}
.table-toolbar{padding:12px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.table-toolbar h2{font-size:14px;font-weight:700;color:var(--text);}
table{width:100%;border-collapse:collapse;}
th{padding:9px 12px;text-align:left;font-size:10.5px;font-weight:700;color:var(--text-sub);border-bottom:1px solid var(--border-light);background:#f8fafc;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border-light);font-size:12.5px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f8fafc;cursor:pointer;}
th.center,td.center{text-align:center;}
td.mono{font-family:'IBM Plex Mono',monospace;font-size:12px;}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap;}
.badge-done   {background:#f0fdf4;color:#16a34a;}
.badge-active {background:#eff6ff;color:#2563eb;}
.badge-wait   {background:#f1f5f9;color:#475569;}
.badge-warning{background:#fffbeb;color:#d97706;}
.badge-danger {background:#fef2f2;color:#dc2626;}
.badge-info   {background:#f0f9ff;color:#0891b2;}

/* ── Buttons ── */
.btn{padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:all .15s;background:var(--card);color:var(--text);}
.btn:hover{background:var(--bg);}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
.btn-primary:hover{background:var(--primary-dark);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-outline{background:transparent;border:1px solid var(--border);}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger);}

/* ── Forms ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:12px;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-field label{font-size:11.5px;font-weight:600;color:var(--text);}
.form-field input,.form-field textarea,.form-field select{
  padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:12.5px;outline:none;color:var(--text);background:var(--card);transition:border .15s;
}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{
  border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.08);
}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border-radius:var(--radius-lg);max-width:560px;width:90%;max-height:90vh;overflow:auto;box-shadow:var(--shadow-lg);animation:modalIn .2s ease-out;}
@keyframes modalIn{from{opacity:0;transform:scale(.96)translateY(8px);}to{opacity:1;transform:scale(1)translateY(0);}}
.modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-sub);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:background .15s;}
.modal-close:hover{background:var(--bg);}
.modal-body{padding:20px 22px;}
.modal-footer{padding:12px 22px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px;}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-lg);}
#toast.show{opacity:1;}

/* ── Spinner ── */
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Progress bar ── */
.prog-wrap{display:flex;align-items:center;gap:8px;}
.prog-track{flex:1;height:6px;background:#e8eaed;border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;background:var(--primary);}
.prog-fill.green{background:var(--success);}
.prog-fill.red{background:var(--danger);}

/* ── Step flow ── */
.step-flow{display:flex;align-items:stretch;gap:0;margin-bottom:20px;}
.step-item{flex:1;min-width:0;}
.step-box{
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 8px;text-align:center;background:var(--card);
  transition:all .2s;height:100%;
}
.step-box.done{background:#f0fdf4;border-color:#86efac;}
.step-box.active{background:var(--primary-light);border-color:#93c5fd;box-shadow:0 0 0 2px rgba(37,99,235,.15);}
.step-box.wait{background:#f8fafc;border-color:var(--border);}
.step-label{font-size:10px;font-weight:600;color:var(--text-sub);margin-bottom:4px;}
.step-date{font-size:12px;font-weight:700;color:var(--text);font-family:'IBM Plex Mono',monospace;}
.step-status{font-size:10px;margin-top:3px;}
.step-sep{display:flex;align-items:center;padding:0 4px;color:var(--text-muted);font-size:16px;flex-shrink:0;}

/* ── Gantt ── */
.gantt-container{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--border-light);overflow:hidden;}
.gantt-row-head{
  width:190px;min-width:190px;flex-shrink:0;
  border-right:1px solid var(--border-light);
  padding:10px 14px;background:var(--card);
}
.gantt-timeline{flex:1;position:relative;min-height:72px;overflow:hidden;}
.gantt-bar{
  position:absolute;border-radius:3px;
  display:flex;align-items:center;padding:0 6px;
  font-size:10px;font-weight:600;color:#fff;
  overflow:hidden;white-space:nowrap;cursor:pointer;
  transition:opacity .15s;
}
.gantt-bar:hover{opacity:.85;}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--danger);opacity:.6;pointer-events:none;z-index:5;}
.gantt-month-line{position:absolute;top:0;bottom:0;width:1px;background:var(--border-light);pointer-events:none;}

/* ── Eco flow ── */
.eco-grid{display:grid;gap:12px;}
.eco-node{background:var(--card);border-radius:var(--radius);border:1px solid var(--border-light);box-shadow:var(--shadow-sm);overflow:hidden;}
.eco-node-hdr{
  padding:10px 16px;border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;background:#f8fafc;
}
.eco-node-hdr h3{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;}
.eco-node-body{padding:16px;}
.eco-count-big{font-size:36px;font-weight:700;line-height:1;font-family:'IBM Plex Mono',monospace;}
.eco-flow-chain{display:flex;align-items:center;gap:0;overflow-x:auto;padding:4px 0;}
.eco-chain-node{
  flex-shrink:0;min-width:120px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 10px;text-align:center;
}
.eco-chain-node.has-units{border-color:#93c5fd;background:var(--primary-light);}
.eco-chain-node.delivered{border-color:#86efac;background:#f0fdf4;}
.eco-chain-arrow{padding:0 6px;color:var(--text-muted);font-size:18px;flex-shrink:0;}

/* ── Filter bar ── */
.filter-bar{background:var(--card);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;box-shadow:var(--shadow-sm);border:1px solid var(--border-light);}
select{padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;background:#f8fafc;cursor:pointer;outline:none;color:var(--text);}
select:focus{border-color:var(--primary);}

/* ── Board detail table ── */
.detail-section{margin-bottom:20px;}
.detail-section h4{font-size:12px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border-light);}

/* ── Alert bar ── */
.alert-bar{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--radius-sm);padding:8px 16px;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--danger);font-weight:600;}
.alert-bar-info{background:#eff6ff;border-color:#bfdbfe;color:var(--primary);}
</style>
</head>
<body>
<div id="app-shell">
  <nav id="sidebar">
    <button class="sidebar-toggle" id="sidebar-toggle-btn" title="折り畳む">‹</button>
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">📊</div>
      <div class="sidebar-logo-text">
        <span class="sidebar-logo-title">営業進捗管理</span>
        <span class="sidebar-logo-sub">Sales Progress System</span>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="sidebar-section-label">メインメニュー</div>
      <div class="nav-item active" data-page="dashboard">
        <span class="nav-item-icon">🏠</span>
        <span class="nav-item-label">ダッシュボード</span>
      </div>
      <div class="nav-item" data-page="schedule">
        <span class="nav-item-icon">📅</span>
        <span class="nav-item-label">スケジュール</span>
      </div>
      <div class="nav-item" data-page="eco">
        <span class="nav-item-icon">♻️</span>
        <span class="nav-item-label">エコフロー</span>
        <span class="nav-badge-wrap"><span class="nav-badge" id="eco-badge">1</span></span>
      </div>
      <div class="nav-item" data-page="flow">
        <span class="nav-item-icon">🔄</span>
        <span class="nav-item-label">業務フロー</span>
      </div>
      <div class="sidebar-section-label">管理</div>
      <div class="nav-item" data-page="log">
        <span class="nav-item-icon">📝</span>
        <span class="nav-item-label">更新ログ</span>
      </div>
    </div>
    <div class="sidebar-footer">
      <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;color:rgba(255,255,255,.5);font-size:10px;">
        <span style="width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0;"></span>
        <span id="sidebar-date-label"></span>
      </div>
    </div>
  </nav>

  <div id="main">
    <div id="topbar">
      <div>
        <div class="topbar-title" id="topbar-title">ダッシュボード</div>
        <div class="topbar-sub">遊技機 基板・エコ進捗管理 — 最終更新: 2026-05-25</div>
      </div>
      <div class="topbar-spacer"></div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div id="content">
      <div id="page-dashboard" class="page active"></div>
      <div id="page-schedule" class="page"></div>
      <div id="page-eco" class="page"></div>
      <div id="page-flow" class="page"></div>
      <div id="page-log" class="page"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Edit machine modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="edit-modal-title">機種編集</h3>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-field">
          <label>ステータス</label>
          <select id="edit-status">
            <option>量産前</option><option>量産中</option><option>量産終了</option>
          </select>
        </div>
        <div class="form-field">
          <label>量産台数</label>
          <input type="text" id="edit-qty">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field"><label>見本機 実装日</label><input type="date" id="edit-sampleImpl"></div>
        <div class="form-field"><label>見本機 組立日</label><input type="date" id="edit-sampleAssy"></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label>見本機 出荷日</label><input type="date" id="edit-sampleShip"></div>
        <div class="form-field"><label>量産 実装日</label><input type="date" id="edit-prodImpl"></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label>量産 組立日</label><input type="date" id="edit-prodAssy"></div>
        <div class="form-field"><label>量産 出荷日</label><input type="date" id="edit-prodShip"></div>
      </div>
      <div class="form-field" style="margin-top:4px;">
        <label>備考・メモ</label>
        <textarea id="edit-notes" rows="3"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="closeEditModal()">キャンセル</button>
      <button class="btn btn-primary btn-sm" onclick="saveEditModal()">💾 保存</button>
    </div>
  </div>
</div>

<!-- Eco update modal -->
<div class="modal-overlay" id="eco-modal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-head">
      <h3 id="eco-modal-title">台数更新</h3>
      <button class="modal-close" onclick="closeEcoModal()">✕</button>
    </div>

const isNear = d => { if(!d) return false; const diff=(new Date(d)-todayD)/86400000; return diff>=0&&diff<=7; };
const getDiff = d => { if(!d) return null; return Math.ceil((new Date(d)-todayD)/86400000); };

function showToast(msg, dur=2800){

}

function addLog(msg){

}

function closeEcoModal(){ document.getElementById('eco-modal').classList.remove('open'); }
function saveEcoModal(){
  const {machine, stage} = ecoEditing;
  const val = parseInt(document.getElementById('eco-modal-val').value)||0;
  if(!state.eco[machine]) state.eco[machine]={};
  state.eco[machine][stage] = val;
  const stg = ECO_STAGES.find(s=>s.id===stage);
  addLog(`エコ [${machine}] ${stg.label}: ${val}台 に更新`);
  closeEcoModal();
  showToast(`✅ ${machine} / ${stg.label}: ${val}台`);

}

/* ── Move modal ── */
function openMoveModal(){
  const machine = state.selectedMachine;
  const eco = state.eco[machine]||{};
  const fromSel = document.getElementById('move-from');
  const toSel   = document.getElementById('move-to');
  fromSel.innerHTML = ECO_STAGES.map(s=>`<option value="${s.id}">${s.label}（${eco[s.id]||0}台）</option>`).join('');
  toSel.innerHTML   = ECO_STAGES.map(s=>`<option value="${s.id}">${s.label}</option>`).join('');
  document.getElementById('move-qty').value = 1;
  document.getElementById('move-modal').classList.add('open');
}
function execMove(){
  const machine = state.selectedMachine;
  const from  = document.getElementById('move-from').value;
  const to    = document.getElementById('move-to').value;
  const qty   = parseInt(document.getElementById('move-qty').value)||0;
  if(from===to){showToast('⚠️ 移動元と移動先が同じです');return;}
  const eco = state.eco[machine]||{};
  const avail = eco[from]||0;
  const actual = Math.min(qty, avail);
  if(actual<=0){showToast('⚠️ 移動できる台数がありません');return;}
  eco[from] = avail - actual;
  eco[to]   = (eco[to]||0) + actual;
  state.eco[machine] = eco;
  const fl = ECO_STAGES.find(s=>s.id===from).label;
  const tl = ECO_STAGES.find(s=>s.id===to).label;
  addLog(`エコ [${machine}] ${fl}→${tl}: ${actual}台 移動`);
  document.getElementById('move-modal').classList.remove('open');
  showToast(`✅ ${actual}台 移動完了`);
  renderPage('eco');
  updateEcoBadge();
  saveToGAS();
}

function saveToGAS(){
  if(typeof google!=='undefined'&&google.script){
    google.script.run.saveData(JSON.stringify({
      statuses:state.statuses,
      schedules:state.schedules,
      notes:state.notes,
      eco:state.eco,
    }));
  }
}

function updateEcoBadge(){
  const total = Object.values(state.eco).reduce((sum,eco)=>{
    return sum + Object.entries(eco).filter(([k])=>k!=='delivered').reduce((s,[,v])=>s+v,0);
  },0);
  const el = document.getElementById('eco-badge');
  if(el){ el.textContent=total; el.style.display=total>0?'':'none'; }
}

/* ── Helpers ── */
function badgeHtml(status){
  const map = {'量産終了':'badge-done','量産中':'badge-active','量産前':'badge-wait'};
  return `<span class="badge ${map[status]||'badge-wait'}">${status}</span>`;
}
function nearBadge(d){
  if(!d) return '';
  if(isPast(d)) return '<span class="badge badge-done" style="font-size:9px;padding:1px 5px;">完了</span>';
  if(isNear(d)) return '<span class="badge badge-warning" style="font-size:9px;padding:1px 5px;">直近</span>';
  return '';
}
function tdDate(d){
  const past = isPast(d);
  const near = isNear(d);
  const style = near?'background:#fffbeb;font-weight:600;color:#d97706;': past?'color:#94a3b8;':'';
  return `<td class="mono center" style="${style}">${fmtD(d)} ${nearBadge(d)}</td>`;
}

  // Near-deadline items
  const nearItems = [];

    const sch = schedules[m.id];

      {key:'sampleShip',label:'見本機出荷'},
      {key:'prodImpl',  label:'量産実装'},
      {key:'prodAssy',  label:'量産組立'},
      {key:'prodShip',  label:'量産出荷'},
    ];
    fields.forEach(f=>{
      if(isNear(sch[f.key])){
        nearItems.push({id:m.id,label:f.label,date:sch[f.key],diff:getDiff(sch[f.key])});
      }
    });

  // Eco summary

  const machineRows = MACHINES.map(m=>{

  // Eco summary mini

    ecoSummaryHtml = `
      <div class="table-wrap" style="margin-top:20px;">
        <div class="table-toolbar"><h2>♻️ エコ台数サマリー</h2>
          <button class="btn btn-sm" onclick="showPage('eco')">詳細 →</button>
        </div>
        <table><thead><tr>
          <th>機種</th>${ECO_STAGES.map(s=>`<th class="center">${s.label}</th>`).join('')}<th class="center">合計</th>
        </tr></thead><tbody>${rows}</tbody></table>
      </div>`;
  }

  document.getElementById('page-dashboard').innerHTML = `
    ${alertHtml}
    <div class="summary-grid">
      <div class="summary-card"><div class="lbl">登録機種数</div><div class="val">${totalMachines}</div><div class="sub">全機種</div></div>

      <div class="summary-card"><div class="lbl">エコ処理中</div><div class="val c-blue">${ecoTotal}</div><div class="sub">全工程合計台数</div></div>
    </div>
    <div class="table-wrap">
      <div class="table-toolbar">
        <h2>📋 機種一覧</h2>
        <div style="font-size:11px;color:var(--text-muted);">行クリックで業務フロー表示</div>

/* ============================================================
   RENDER: SCHEDULE (Gantt)
============================================================ */
function renderSchedule(){
  const MONTHS = [
    {label:'3月',start:'2026-03-01',days:31},
    {label:'4月',start:'2026-04-01',days:30},
    {label:'5月',start:'2026-05-01',days:31},
    {label:'6月',start:'2026-06-01',days:30},
    {label:'7月',start:'2026-07-01',days:31},
    {label:'8月',start:'2026-08-01',days:31},
    {label:'9月',start:'2026-09-01',days:30},
  ];
  const RANGE_START = new Date('2026-03-01');
  const RANGE_END   = new Date('2026-09-30');
  const TOTAL = (RANGE_END-RANGE_START)/86400000;

  function pct(d){ if(!d) return null; const p=(new Date(d)-RANGE_START)/86400000/TOTAL*100; return Math.min(100,Math.max(0,p)); }
  const todayPct = pct(TODAY);

  const PHASE_DEFS = [
    {key:'sampleImpl',label:'見本機実装',color:'#7c3aed',top:8,h:22},
    {key:'sampleAssy',label:'見本機組立',color:'#0891b2',top:8,h:22},
    {key:'sampleShip',label:'見本機出荷',color:'#1d4ed8',top:8,h:22},
    {key:'prodImpl',  label:'量産実装',  color:'#15803d',top:38,h:22},
    {key:'prodAssy',  label:'量産組立',  color:'#b45309',top:38,h:22},
    {key:'prodShip',  label:'量産出荷',  color:'#dc2626',top:38,h:22},
  ];

  // Month header HTML
  const monthHdrHtml = MONTHS.map(m=>`
    <div style="flex:${m.days};border-right:1px solid var(--border-light);padding:6px 0;text-align:center;font-size:11px;font-weight:600;color:var(--text-sub);">${m.label}</div>
  `).join('');

  // Month grid lines
  let gridLinesHtml = '';
  let acc = 0;
  MONTHS.forEach((m,i)=>{
    if(i>0) gridLinesHtml += `<div class="gantt-month-line" style="left:${acc/TOTAL*100}%;"></div>`;
    acc += m.days;
  });

  const rowsHtml = MACHINES.map(m=>{
    const sch = state.schedules[m.id];
    const status = state.statuses[m.id];

    const bars = PHASE_DEFS.map(ph=>{
      const p = pct(sch[ph.key]);
      if(p===null) return '';
      const past = isPast(sch[ph.key]);
      const color = past ? '#94a3b8' : ph.color;
      return `<div class="gantt-bar" style="left:${p}%;top:${ph.top}px;height:${ph.h}px;background:${color};width:auto;min-width:6px;border-radius:4px;white-space:nowrap;padding:0 5px;font-size:9px;transform:translateX(-3px);"
        title="${ph.label}: ${fmtD(sch[ph.key])} ${past?'(完了)':''}">
        ${ph.label.replace('見本機','').replace('量産','')}<br>${fmtD(sch[ph.key])}
      </div>`;
    }).join('');

    return `
      <div style="display:flex;border-bottom:1px solid var(--border-light);min-height:80px;">
        <div class="gantt-row-head">
          <div style="font-weight:700;font-size:14px;">${m.id}</div>
          <div style="font-size:11px;color:var(--text-sub);margin-top:2px;">${m.person}</div>
          <div style="margin-top:4px;">${badgeHtml(status)}</div>
        </div>
        <div class="gantt-timeline" style="flex:1;">
          ${gridLinesHtml}
          ${todayPct!==null?`<div class="gantt-today-line" style="left:${todayPct}%;"></div>`:''}
          ${bars}
        </div>
      </div>`;
  }).join('');

  document.getElementById('page-schedule').innerHTML = `
    <div class="page-heading">
      <div><h2>スケジュール</h2><p>2026年3月〜9月 / ▼ 今日: ${fmtD(TODAY)}</p></div>
    </div>
    <div class="gantt-container">
      <div style="display:flex;border-bottom:2px solid var(--border);">
        <div style="width:190px;min-width:190px;border-right:1px solid var(--border-light);padding:8px 14px;background:#f8fafc;font-size:11px;font-weight:700;color:var(--text-sub);">機種</div>
        <div style="flex:1;display:flex;min-width:600px;">${monthHdrHtml}</div>
      </div>
      <div style="min-width:790px;">${rowsHtml}</div>
    </div>
    <div style="margin-top:12px;display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--text-muted);">
      ${PHASE_DEFS.map(p=>`<span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:${p.color};display:inline-block;"></span>${p.label}</span>`).join('')}
      <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#94a3b8;display:inline-block;"></span>完了済み</span>
      <span style="display:flex;align-items:center;gap:4px;"><span style="width:2px;height:14px;background:var(--danger);display:inline-block;"></span>今日</span>
    </div>`;
}

/* ============================================================
   RENDER: ECO FLOW
============================================================ */
function renderEco(){
  const machine = state.selectedMachine;
  const eco = state.eco[machine]||{};
  const totalInFlow = Object.entries(eco).filter(([k])=>k!=='delivered').reduce((a,[,b])=>a+b,0);
  const delivered = eco.delivered||0;

  const machineSelHtml = MACHINES.map(m=>`
    <option value="${m.id}" ${m.id===machine?'selected':''}>${m.id}</option>
  `).join('');

  // Chain nodes
  const chainHtml = ECO_STAGES.map((s,i)=>{
    const qty = eco[s.id]||0;
    const hasUnits = qty>0;
    const isDelivered = s.id==='delivered';
    const arrowHtml = i>0?`<div class="eco-chain-arrow">→</div>`:'';
    const nodeClass = isDelivered&&hasUnits?'eco-chain-node delivered': hasUnits?'eco-chain-node has-units':'eco-chain-node';
    return `${arrowHtml}
      <div class="${nodeClass}">
        <div style="font-size:11px;font-weight:700;color:var(--text);">${s.label}</div>
        <div style="font-size:10px;color:var(--text-sub);margin-bottom:6px;">${s.sub}</div>
        <div class="eco-count-big" style="color:${hasUnits?(isDelivered?'var(--success)':'var(--primary)'):'var(--text-muted)'};">${qty}</div>
        <div style="font-size:10px;color:var(--text-muted);margin-bottom:8px;">台</div>
        <button class="btn btn-sm" onclick="openEcoModal('${machine}','${s.id}')">更新</button>
      </div>`;
  }).join('');

  // Detail table
  const tableRows = ECO_STAGES.map(s=>{
    const qty = eco[s.id]||0;
    const total = Object.values(eco).reduce((a,b)=>a+b,0)||1;
    const pctVal = Math.round(qty/total*100);
    return `
      <tr>
        <td style="font-weight:${qty>0?'700':'400'}">${s.label}</td>
        <td style="color:var(--text-sub);font-size:12px;">${s.company||'（自社）'}</td>
        <td class="center mono" style="font-size:16px;font-weight:700;color:${qty>0?'var(--primary)':'var(--text-muted)'};">${qty}</td>
        <td>
          <div class="prog-wrap">
            <div class="prog-track"><div class="prog-fill" style="width:${pctVal}%;"></div></div>
            <span style="font-size:11px;color:var(--text-sub);min-width:30px;">${pctVal}%</span>
          </div>
        </td>
      </tr>`;
  }).join('');

  document.getElementById('page-eco').innerHTML = `
    <div class="page-heading">
      <div><h2>♻️ エコフロー管理</h2><p>遊技機エコ（中古品）の処理フロー リアルタイム管理</p></div>
    </div>
    <div class="filter-bar">
      <span style="font-size:12px;font-weight:600;">対象機種:</span>
      <select onchange="state.selectedMachine=this.value;renderPage('eco');">${machineSelHtml}</select>
      <span style="font-size:12px;color:var(--text-sub);">処理中合計: <strong>${totalInFlow}</strong>台 ／ 納品済: <strong>${delivered}</strong>台</span>
      <div style="flex:1;"></div>
      <button class="btn btn-sm" onclick="openMoveModal()">⇄ 工程間移動</button>
    </div>

    <div class="alert-bar alert-bar-info" style="margin-bottom:16px;">
      ℹ️ フロー: 回収 → 解体（いードリーム） → E基板検査（岐阜電子）・SNB基板検査（めいこー）[並行] → 組み立て（いードリーム） → お客様納品
    </div>

    <div class="table-wrap" style="margin-bottom:20px;">
      <div class="table-toolbar"><h2>フロー図 — ${machine}</h2></div>
      <div style="padding:16px;overflow-x:auto;">
        <div class="eco-flow-chain">${chainHtml}</div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-toolbar"><h2>各工程 台数明細</h2></div>
      <table>
        <thead><tr>
          <th>工程</th><th>委託先</th><th class="center">台数</th><th style="min-width:160px;">構成比</th>
        </tr></thead>
        <tbody>
          ${tableRows}
          <tr style="background:#f8fafc;">
            <td colspan="2" style="font-weight:700;">合　計</td>
            <td class="center mono" style="font-size:16px;font-weight:700;">${Object.values(eco).reduce((a,b)=>a+b,0)}</td>
            <td>100%</td>
          </tr>
        </tbody>
      </table>
    </div>`;
}

/* ============================================================
   RENDER: FLOW (業務フロー)
============================================================ */
function renderFlow(){
  const selId = state.flowMachine || MACHINES[0].id;
  const m = MACHINES.find(x=>x.id===selId);
  const sch = state.schedules[selId];
  const status = state.statuses[selId];

  const STEPS_SAMPLE = [
    {key:'sampleImpl',label:'見本機 基板実装'},
    {key:'sampleAssy',label:'見本機 組立'},
    {key:'sampleShip',label:'見本機 出荷'},
  ];
  const STEPS_PROD = [
    {key:'prodImpl',label:'量産 基板実装'},
    {key:'prodAssy',label:'量産 組立'},
    {key:'prodShip',label:'量産 出荷'},
  ];

  function stepHtml(steps){
    return steps.map((s,i)=>{
      const d = sch[s.key];
      const st = isPast(d)?'done': d?'active':'wait';
      const icon = st==='done'?'✅': st==='active'?'🔄':'⏳';
      const arr = i>0?`<div class="step-sep">→</div>`:'';
      const diff = getDiff(d);
      const diffLabel = d?`${isPast(d)?'完了':'あと'+diff+'日'}`:'未定';
      return `${arr}
        <div class="step-item">
          <div class="step-box ${st}">
            <div class="step-label">${icon} ${s.label}</div>
            <div class="step-date">${fmtD(d)}</div>
            <div class="step-status">${diffLabel}</div>
          </div>
        </div>`;
    }).join('');
  }

  const machineBtnsHtml = MACHINES.map(x=>`
    <button class="btn btn-sm ${x.id===selId?'btn-primary':''}"
      onclick="state.flowMachine='${x.id}';renderPage('flow');">${x.id}</button>
  `).join('');

  const boardRows = m.boards.map(b=>`
    <tr>
      <td>${b.type}</td>
      <td class="mono">${b.model}</td>
      <td class="center">${b.qty?b.qty+'台':'—'}</td>
    </tr>`).join('');

  document.getElementById('page-flow').innerHTML = `
    <div class="page-heading">
      <div><h2>🔄 業務フロー</h2><p>機種別 工程進捗状況</p></div>
    </div>
    <div class="filter-bar">${machineBtnsHtml}</div>

    <div class="table-wrap" style="margin-bottom:16px;">
      <div class="table-toolbar">
        <h2>【 ${m.id} 】 ${m.person}担当</h2>
        <div style="display:flex;align-items:center;gap:10px;">
          ${badgeHtml(status)}
          ${m.compliance?`<span class="badge badge-info">${m.compliance}</span>`:''}
          <span style="font-size:12px;color:var(--text-sub);">量産台数: <strong>${m.prodQty}</strong></span>
          <button class="btn btn-sm" onclick="openEditModal('${m.id}')">✏️ 編集</button>
        </div>
      </div>
      <div style="padding:20px;">
        <div class="detail-section">
          <h4>見本機フロー</h4>
          <div class="step-flow">${stepHtml(STEPS_SAMPLE)}</div>
        </div>
        <div class="detail-section">
          <h4>量産フロー</h4>
          <div class="step-flow">${stepHtml(STEPS_PROD)}</div>
        </div>
        <div class="detail-section">
          <h4>使用基板</h4>
          <table style="width:auto;">
            <thead><tr><th>種別</th><th>型番</th><th class="center">台数</th></tr></thead>
            <tbody>${boardRows}</tbody>
          </table>
          <div style="margin-top:8px;font-size:12px;color:var(--text-sub);">ROM種類: ${m.rom}</div>
        </div>
        <div class="detail-section">
          <h4>備考・メモ</h4>
          <div style="background:var(--bg);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:12px;font-size:13px;line-height:1.8;color:var(--text);">
            ${state.notes[selId]||'<span style="color:var(--text-muted);">（なし）</span>'}
          </div>
        </div>
      </div>
    </div>`;
}

/* ============================================================
   RENDER: LOG
============================================================ */
function renderLog(){
  const rows = state.logs.length===0
    ? `<tr><td colspan="2" style="text-align:center;padding:40px;color:var(--text-muted);">更新ログなし</td></tr>`
    : state.logs.map(l=>`
        <tr>
          <td class="mono" style="font-size:11px;color:var(--text-sub);white-space:nowrap;width:180px;">${l.ts}</td>
          <td style="font-size:12px;">${l.msg}</td>
        </tr>`).join('');

  document.getElementById('page-log').innerHTML = `
    <div class="page-heading">
      <div><h2>📝 更新ログ</h2><p>直近 ${state.logs.length} 件</p></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>日時</th><th>内容</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

/* ============================================================
   ROUTER
============================================================ */
function renderPage(page){
  if(page==='dashboard') renderDashboard();
  else if(page==='schedule') renderSchedule();
  else if(page==='eco') renderEco();
  else if(page==='flow') renderFlow();
  else if(page==='log') renderLog();
}

/* ── Init ── */
function _init(saved){
  if(saved){
    try{
      const s = typeof saved==='string' ? JSON.parse(saved) : saved;
      if(s.statuses) Object.assign(state.statuses, s.statuses);
      if(s.schedules) Object.assign(state.schedules, s.schedules);
      if(s.notes)     Object.assign(state.notes, s.notes);
      if(s.eco)       Object.assign(state.eco, s.eco);
    }catch(e){}
  }
  updateEcoBadge();
  renderDashboard();
}
if(typeof google!=='undefined'&&google.script){
  google.script.run
    .withSuccessHandler(_init)
    .withFailureHandler(()=>_init(null))
    .loadData();
}else{
  _init(null);
}
</script>
</body>
</html>
