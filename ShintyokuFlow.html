<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>業務フロー進捗管理</title>

<!-- React + ReactFlow をCDNから読み込み（GAS HTMLファイルから外部CDN可） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<!-- ReactFlow はCDN非公式のため、軽量な自前SVGフローで実装（GAS環境での確実な動作を優先） -->

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    height: 100vh;
    overflow: hidden;
  }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&display=swap');

  /* ===== アニメーション ===== */
  @keyframes spin    { to { transform: rotate(360deg); } }
  @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.25} }
  @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  @keyframes flash   { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 0 4px #10b98166} }
  @keyframes glow    { 0%,100%{opacity:1} 50%{opacity:.6} }

  /* ===== スクロールバー ===== */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

  /* ===== ヘッダー ===== */
  #header {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    background: linear-gradient(90deg, #0f172a 0%, #1e293b 100%);
    border-bottom: 1px solid #1e3a5f;
    display: flex; align-items: center; padding: 0 14px; gap: 10px;
    z-index: 1000;
  }
  .hdr-title { color: #fff; font-weight: 800; font-size: 15px; }
  .hdr-badge {
    color: #38bdf8; font-weight: 700; font-size: 10px;
    background: #0ea5e922; border: 1px solid #0ea5e944;
    border-radius: 6px; padding: 2px 8px;
  }
  .hdr-spacer { flex: 1; }
  .hdr-toast {
    background: #10b981; color: #fff; border-radius: 20px;
    padding: 3px 14px; font-size: 11px; font-weight: 700;
    animation: slideIn 0.3s ease;
  }
  .hdr-conn {
    display: flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 10px; font-weight: 700;
    transition: all 0.3s;
  }
  .conn-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }
  .btn {
    padding: 5px 12px; border: none; border-radius: 6px;
    color: #fff; font-size: 10px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
    display: flex; align-items: center; gap: 4px;
  }
  .btn-blue { background: #3b82f6; }
  .btn-blue:hover { background: #2563eb; }
  .btn-gray { background: #334155; }
  .btn-toggle {
    padding: 4px 12px; border: 1px solid #475569;
    border-radius: 20px; background: #334155;
    color: #64748b; font-size: 10px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .btn-toggle.on {
    background: #10b98122; border-color: #10b98144; color: #10b981;
  }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  .pulse { animation: pulse 1.5s infinite; }

  /* ===== メインレイアウト ===== */
  #main {
    position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
    display: flex;
  }

  /* ===== 左パネル ===== */
  #side {
    width: 200px; flex-shrink: 0;
    background: #1e293b; border-right: 1px solid #334155;
    display: flex; flex-direction: column;
    z-index: 100;
  }
  .side-tabs { display: flex; background: #0f172a; flex-shrink: 0; }
  .side-tab {
    flex: 1; padding: 8px 4px; border: none;
    background: transparent; color: #475569;
    font-size: 10px; font-weight: 700; cursor: pointer;
    font-family: inherit; border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .side-tab.active {
    background: #1e293b; color: #e2e8f0;
    border-bottom-color: #3b82f6;
  }
  .side-scroll { overflow-y: auto; flex: 1; }
  .side-row {
    padding: 9px 12px; border-bottom: 1px solid #0f172a;
    display: flex; align-items: center; gap: 8px;
  }
  .side-icon { font-size: 16px; flex-shrink: 0; }
  .side-info { flex: 1; min-width: 0; }
  .side-label { font-weight: 700; font-size: 11px; }
  .side-sub { font-size: 9px; color: #475569; margin-top: 1px; }
  .side-badge {
    border-radius: 50%; width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 12px; flex-shrink: 0;
    color: #fff; transition: all 0.3s;
  }
  .person-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 800; font-size: 13px; flex-shrink: 0;
  }

  /* ===== フローエリア ===== */
  #flow-area {
    flex: 1; overflow: auto; position: relative;
    background: #0f172a;
    background-image:
      radial-gradient(circle, #1e293b 1px, transparent 1px);
    background-size: 24px 24px;
  }
  #flow-canvas {
    position: relative;
    padding: 16px 24px 40px 24px;
    min-width: max-content;
  }

  /* ===== ステージヘッダー ===== */
  .stage-headers {
    display: flex; gap: 8px; margin-bottom: 12px;
    padding-left: 4px;
  }
  .stage-hdr {
    width: 210px; flex-shrink: 0;
    padding: 6px 14px; border-radius: 8px;
    font-size: 11px; font-weight: 800; color: #fff;
    letter-spacing: 0.5px; text-align: center;
    font-family: inherit;
  }

  /* ===== スイムレーン ===== */
  .lane {
    display: flex; gap: 8px;
    border-radius: 12px; margin-bottom: 10px;
    border: 1.5px solid transparent;
    transition: all 0.3s;
    padding: 10px 8px;
  }
  .lane-label {
    width: 0; flex-shrink: 0; /* 非表示、CSSでレーン色をborderに表現 */
  }
  .lane-col {
    width: 210px; flex-shrink: 0;
    min-height: 140px;
    display: flex; flex-direction: column; gap: 8px;
  }

  /* ===== 注文カード ===== */
  .card {
    background: #f8fafc; border-radius: 10px;
    border: 2px solid transparent;
    overflow: hidden; cursor: pointer;
    transition: all 0.2s; width: 100%;
    animation: slideIn 0.3s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px #0004; }
  .card.flash { animation: flash 0.4s 2; }
  .card-top {
    padding: 3px 10px; font-size: 10px; font-weight: 700;
    color: #fff; display: flex; justify-content: space-between;
  }
  .card-body { padding: 8px 10px 7px; }
  .card-client {
    font-weight: 800; font-size: 12px; color: #1e293b;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .card-no {
    color: #94a3b8; font-size: 10px; font-family: monospace;
    margin-bottom: 5px;
  }
  .card-status-row {
    display: flex; align-items: center; gap: 5px; margin-bottom: 5px;
  }
  .status-pill {
    border-radius: 20px; padding: 2px 8px;
    font-size: 10px; font-weight: 700;
  }
  .card-type { color: #94a3b8; font-size: 10px; }
  .progress-bg {
    background: #e2e8f0; border-radius: 3px; height: 3px; margin-bottom: 5px;
  }
  .progress-bar { height: 100%; border-radius: 3px; transition: width 0.6s; }
  .card-foot {
    display: flex; justify-content: space-between;
    font-size: 10px; color: #64748b;
  }
  .card-memo {
    margin-top: 4px; font-size: 10px; color: #64748b;
    background: #f1f5f9; border-radius: 4px; padding: 2px 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-machine {
    max-width: 95px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; text-align: right;
  }

  /* ===== モーダル ===== */
  #modal-overlay {
    display: none;
    position: fixed; inset: 0; background: #000b; z-index: 5000;
    align-items: center; justify-content: center; padding: 12px;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: #1e293b; border-radius: 16px;
    width: 100%; max-width: 440px;
    box-shadow: 0 24px 64px #000c;
    overflow: hidden; animation: slideIn 0.25s ease;
    max-height: 95vh; overflow-y: auto;
  }
  .modal-hdr {
    padding: 14px 18px;
    display: flex; justify-content: space-between; align-items: flex-start;
    color: #fff; flex-shrink: 0;
  }
  .modal-hdr-info .sub { font-size: 10px; opacity: 0.8; }
  .modal-hdr-info .main { font-size: 17px; font-weight: 800; margin-top: 2px; }
  .modal-hdr-info .sub2 { font-size: 11px; opacity: 0.75; margin-top: 2px; }
  .modal-close {
    background: none; border: none; color: #fff;
    font-size: 26px; cursor: pointer; line-height: 1; flex-shrink: 0;
  }
  .modal-body { padding: 16px; }
  .modal-section { margin-bottom: 14px; }
  .modal-section-title {
    font-size: 11px; color: #64748b; font-weight: 700; margin-bottom: 8px;
  }
  .location-box {
    border-radius: 8px; padding: 9px 12px;
    display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
  }
  .location-icon { font-size: 20px; }
  .location-dept { font-weight: 800; font-size: 13px; }
  .location-stage { font-size: 10px; color: #64748b; margin-top: 1px; }
  .location-progress { font-weight: 700; font-size: 12px; }
  .location-progress-sub { font-size: 10px; color: #64748b; }
  .status-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  }
  .status-btn {
    padding: 9px 10px; border-radius: 8px;
    font-size: 11px; font-weight: 700; cursor: pointer;
    text-align: left; transition: all 0.15s; font-family: inherit;
    border: 2px solid #334155; background: #0f172a; color: #475569;
  }
  .status-btn.selected { }
  .modal-input {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    border: 1px solid #334155; background: #0f172a;
    color: #e2e8f0; font-size: 14px; font-family: inherit;
  }
  .modal-input:focus {
    outline: none; border-color: #3b82f6;
    box-shadow: 0 0 0 3px #3b82f644;
  }
  .modal-textarea {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    border: 1px solid #334155; background: #0f172a;
    color: #e2e8f0; font-size: 13px; font-family: inherit;
    resize: none;
  }
  .modal-textarea:focus {
    outline: none; border-color: #3b82f6;
    box-shadow: 0 0 0 3px #3b82f644;
  }
  .modal-submit {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    color: #fff; font-size: 15px; font-weight: 800; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .modal-submit:disabled { background: #334155 !important; cursor: not-allowed; }
  .modal-note { margin-top: 8px; text-align: center; color: #475569; font-size: 10px; }

  /* ===== レスポンシブ（スマホ） ===== */
  @media (max-width: 640px) {
    #side { display: none; }
    #header { gap: 6px; }
    .hdr-title { font-size: 13px; }
    #modal { max-width: 100%; }
  }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div id="header">
  <span style="font-size:18px">📊</span>
  <div class="hdr-title">業務フロー進捗管理</div>
  <div class="hdr-badge">× VR3</div>
  <div id="hdr-toast" class="hdr-toast" style="display:none"></div>
  <div class="hdr-spacer"></div>
  <div id="hdr-conn" class="hdr-conn">
    <div id="conn-dot" class="conn-dot"></div>
    <span id="conn-label"></span>
  </div>
  <button id="btn-toggle" class="btn-toggle" onclick="togglePolling()">🔄 自動更新ON</button>
  <button id="btn-sync" class="btn btn-blue" onclick="manualSync()">
    <span id="sync-icon">🔄</span><span id="sync-label">今すぐ同期</span>
  </button>
  <span id="last-sync" style="color:#334155;font-size:9px;white-space:nowrap"></span>
</div>

<!-- ===== MAIN ===== -->
<div id="main">

  <!-- 左パネル -->
  <div id="side">
    <div class="side-tabs">
      <button class="side-tab active" id="tab-dept" onclick="switchTab('dept')">🏢 部署別</button>
      <button class="side-tab" id="tab-person" onclick="switchTab('person')">👤 担当者別</button>
    </div>
    <div class="side-scroll" id="side-content"></div>
  </div>

  <!-- フローエリア -->
  <div id="flow-area">
    <div id="flow-canvas">
      <!-- ステージヘッダー -->
      <div class="stage-headers" id="stage-headers"></div>
      <!-- レーン（部署×ステージのグリッド） -->
      <div id="lanes"></div>
    </div>
  </div>
</div>

<!-- ===== 入力モーダル ===== -->
<div id="modal-overlay" onclick="closeModalOnBg(event)">
  <div id="modal">
    <div class="modal-hdr" id="modal-hdr">
      <div class="modal-hdr-info">
        <div class="sub" id="m-sub"></div>
        <div class="main" id="m-main"></div>
        <div class="sub2" id="m-sub2"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <!-- ボールの場所 -->
      <div class="location-box" id="m-location">
        <div class="location-icon" id="m-loc-icon"></div>
        <div style="flex:1">
          <div class="location-dept" id="m-loc-dept"></div>
          <div class="location-stage" id="m-loc-stage"></div>
        </div>
        <div style="text-align:right">
          <div class="location-progress" id="m-loc-pct"></div>
          <div class="location-progress-sub">進捗</div>
        </div>
      </div>

      <!-- ステータス選択 -->
      <div class="modal-section">
        <div class="modal-section-title">📍 ステータス（変更すると全員の画面に反映）</div>
        <div class="status-grid" id="m-status-grid"></div>
      </div>

      <!-- 担当者 -->
      <div class="modal-section">
        <div class="modal-section-title">👤 担当者名</div>
        <input class="modal-input" id="m-assignee" type="text" placeholder="担当者名を入力">
      </div>

      <!-- メモ -->
      <div class="modal-section">
        <div class="modal-section-title">📝 メモ（任意）</div>
        <textarea class="modal-textarea" id="m-memo" rows="3" placeholder="作業メモ・連絡事項など"></textarea>
      </div>

      <!-- 送信 -->
      <button class="modal-submit" id="m-submit" onclick="submitModal()">
        ✅ 全員の画面に反映する
      </button>
      <div class="modal-note">
        ※ Googleスプレッドシート（VR3）に直接書き込みます。外部サービス不要。
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 設定
// ============================================================
// GASから呼ばれる場合: google.script.run を使用
// スタンドアロンHTMLの場合: 下記URLを設定
const GAS_URL = (typeof google !== 'undefined' && google.script)
  ? null  // GAS内蔵モード（google.script.runを使用）
  : 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec';

const POLL_SEC = 5; // ポーリング間隔（秒）

// ============================================================
// 定数定義
// ============================================================
const DEPTS = [
  { id:'sales',     label:'営業部',   color:'#6366f1', icon:'🤝' },
  { id:'repair',    label:'修理部',   color:'#3b82f6', icon:'🔧' },
  { id:'mfg',       label:'製造部',   color:'#f59e0b', icon:'⚙️' },
  { id:'qa',        label:'品質管理', color:'#10b981', icon:'🔍' },
  { id:'logistics', label:'物流部',   color:'#8b5cf6', icon:'🚚' },
  { id:'billing',   label:'経理部',   color:'#ec4899', icon:'💴' },
];
const DEPT_MAP = Object.fromEntries(DEPTS.map(d => [d.id, d]));

const STAGES = [
  { label:'受付',   deptId:'sales',     color:'#6366f1' },
  { label:'見積',   deptId:'sales',     color:'#818cf8' },
  { label:'受注',   deptId:'repair',    color:'#3b82f6' },
  { label:'作業中', deptId:'mfg',       color:'#f59e0b' },
  { label:'検査',   deptId:'qa',        color:'#10b981' },
  { label:'出荷',   deptId:'logistics', color:'#8b5cf6' },
  { label:'完了',   deptId:'billing',   color:'#ec4899' },
];

// VR3ステータス → メタ情報
const STATUS_META = {
  '作成予定':   { deptId:'sales',    stageIdx:0, progress:5,   color:'#6366f1', bg:'#eef2ff', icon:'📋' },
  '送信済み':   { deptId:'sales',    stageIdx:1, progress:25,  color:'#3b82f6', bg:'#eff6ff', icon:'📤' },
  '受領':       { deptId:'repair',   stageIdx:2, progress:45,  color:'#f59e0b', bg:'#fffbeb', icon:'📥' },
  '受注済み':   { deptId:'mfg',      stageIdx:3, progress:65,  color:'#10b981', bg:'#ecfdf5', icon:'✅' },
  '保留':       { deptId:'sales',    stageIdx:0, progress:10,  color:'#8b5cf6', bg:'#f5f3ff', icon:'⏸' },
  'キャンセル': { deptId:'sales',    stageIdx:0, progress:0,   color:'#ef4444', bg:'#fef2f2', icon:'❌' },
  '失注':       { deptId:'sales',    stageIdx:0, progress:0,   color:'#ef4444', bg:'#fef2f2', icon:'✕'  },
  '納品済み':   { deptId:'billing',  stageIdx:6, progress:100, color:'#059669', bg:'#d1fae5', icon:'🏁' },
};

// ============================================================
// 状態
// ============================================================
let orders        = [];
let polling       = true;
let pollTimer     = null;
let cntTimer      = null;
let countdown     = POLL_SEC;
let connected     = false;
let currentTab    = 'dept';
let currentOrder  = null; // モーダル対象
let currentStatus = '';
let saving        = false;

// ============================================================
// GAS API 呼び出し
// ============================================================
function gasCall(action, params, callback) {
  // GAS内蔵モード
  if (GAS_URL === null && typeof google !== 'undefined') {
    let runner = google.script.run
      .withSuccessHandler(callback)
      .withFailureHandler(e => { console.error(e); callback({ success:false }); });
    runner.handleApiRequest(action, params || {});
    return;
  }
  // スタンドアロンモード（URLにGETで叩く）
  const u = new URL(GAS_URL);
  u.searchParams.set('action', action);
  if (params) Object.entries(params).forEach(([k,v]) => u.searchParams.set(k, String(v)));
  fetch(u.toString())
    .then(r => r.json())
    .then(callback)
    .catch(() => callback({ success:false }));
}

function fetchOrders(quiet) {
  if (!quiet) setSyncing(true);
  gasCall('boardGetOrders', {}, function(r) {
    if (r && r.success && r.items && r.items.length) {
      orders = r.items.map(normalizeOrder);
      connected = true;
    } else {
      // fallback
      gasCall('getAll', {}, function(r2) {
        if (r2 && r2.success && r2.items && r2.items.length) {
          orders = r2.items.map(normalizeOrder);
          connected = true;
        } else if (!connected) {
          orders = MOCK_ORDERS.map(normalizeOrder);
        }
        renderAll();
        updateHeader();
        if (!quiet) setSyncing(false);
      });
      return;
    }
    renderAll();
    updateHeader();
    if (!quiet) setSyncing(false);
  });
}

function normalizeOrder(o) {
  return {
    mgmtId:      String(o.mgmtId || o.id || ''),
    orderNo:     o.orderNo  || '—',
    client:      o.client   || o.destCompany || '—',
    status:      o.status   || '作成予定',
    orderAmount: Number(o.orderAmount) || 0,
    modelCode:   o.modelCode   || '',
    machineName: o.machineName || '',
    orderType:   o.orderType   || '',
    assignee:    o.assignee    || '',
    memo:        o.memo        || '',
    boards:      o.boards      || [],
    orderDate:   o.orderDate   || '',
  };
}

function saveOrder(mgmtId, status, assignee, memo, cb) {
  // GAS updateMgmt でスプレッドシートに書き込み
  gasCall('updateMgmt', { mgmtId, status, assignee, memo }, function(r) {
    // ステータスも updateStatus で確実に反映
    gasCall('updateStatus', { mgmtId, newStatus: status }, function() {
      cb(r);
    });
  });
}

// ============================================================
// ポーリング制御
// ============================================================
function startPolling() {
  clearInterval(pollTimer);
  clearInterval(cntTimer);
  countdown = POLL_SEC;
  pollTimer = setInterval(() => { fetchOrders(true); countdown = POLL_SEC; }, POLL_SEC * 1000);
  cntTimer  = setInterval(() => {
    countdown = Math.max(0, countdown - 1);
    const el = document.getElementById('conn-label');
    if (el && connected) el.textContent = `GAS接続 (${countdown}s)`;
  }, 1000);
}
function stopPolling() {
  clearInterval(pollTimer);
  clearInterval(cntTimer);
}
function togglePolling() {
  polling = !polling;
  const btn = document.getElementById('btn-toggle');
  if (polling) {
    startPolling();
    btn.textContent = '🔄 自動更新ON';
    btn.className = 'btn-toggle on';
  } else {
    stopPolling();
    btn.textContent = '⏸ 自動更新OFF';
    btn.className = 'btn-toggle';
  }
}
function manualSync() { fetchOrders(false); }
function setSyncing(v) {
  const icon = document.getElementById('sync-icon');
  const lbl  = document.getElementById('sync-label');
  if (icon) icon.className = v ? 'spin' : '';
  if (icon) icon.textContent = '🔄';
  if (lbl)  lbl.textContent = v ? '同期中' : '今すぐ同期';
  document.getElementById('btn-sync').disabled = v;
}

// ============================================================
// 描画
// ============================================================
function renderAll() {
  renderStageHeaders();
  renderLanes();
  renderSide();
  updateLastSync();
}

function renderStageHeaders() {
  const el = document.getElementById('stage-headers');
  // 左パネル幅の空白
  el.innerHTML = STAGES.map(st =>
    `<div class="stage-hdr" style="background:${st.color};box-shadow:0 4px 14px ${st.color}77">
      ${st.label}
    </div>`
  ).join('');
}

function renderLanes() {
  const el = document.getElementById('lanes');
  // 部署 × ステージ でカードを分類
  const grid = {};
  DEPTS.forEach(d => {
    grid[d.id] = {};
    STAGES.forEach((_, i) => { grid[d.id][i] = []; });
  });
  orders.forEach(o => {
    const meta = STATUS_META[o.status] || STATUS_META['作成予定'];
    if (grid[meta.deptId] && grid[meta.deptId][meta.stageIdx] !== undefined) {
      grid[meta.deptId][meta.stageIdx].push(o);
    }
  });

  el.innerHTML = DEPTS.map(d => {
    const hasCards = STAGES.some((_, i) => grid[d.id][i].length > 0);
    const count = orders.filter(o => (STATUS_META[o.status]?.deptId || 'sales') === d.id).length;
    return `
      <div class="lane" style="border-color:${d.color}25;background:${d.color}08" data-dept="${d.id}">
        ${STAGES.map((st, i) => {
          const cards = grid[d.id][i];
          return `<div class="lane-col" data-stage="${i}">
            ${cards.map(o => renderCard(o, d, st)).join('')}
          </div>`;
        }).join('')}
      </div>
      <!-- 部署ラベルを左端に表示 -->
    `;
  }).join('');

  // レーンの前に部署ラベル行を追加
  const laneEls = el.querySelectorAll('.lane');
  DEPTS.forEach((d, i) => {
    const count = orders.filter(o => (STATUS_META[o.status]?.deptId || 'sales') === d.id).length;
    const label = document.createElement('div');
    label.style.cssText = `
      display:flex; align-items:center; gap:6px;
      padding:4px 0 4px 4px; margin-bottom:-6px;
    `;
    label.innerHTML = `
      <span style="font-size:14px">${d.icon}</span>
      <span style="color:${d.color};font-weight:800;font-size:11px">${d.label}</span>
      <span style="background:${d.color};color:#fff;border-radius:20px;padding:1px 9px;
        font-size:11px;font-weight:800;
        box-shadow:${count>0?`0 0 10px ${d.color}99`:'none'}">${count}件</span>
    `;
    if (laneEls[i]) el.insertBefore(label, laneEls[i]);
  });
}

function renderCard(o, dept, stage) {
  const meta = STATUS_META[o.status] || STATUS_META['作成予定'];
  const gradStart = dept.color;
  const gradEnd   = meta.color;
  const amt = o.orderAmount > 0 ? `¥${Number(o.orderAmount).toLocaleString()}` : '—';
  const machine = (o.machineName || o.modelCode || '').substring(0, 12);
  const memoHtml = o.memo
    ? `<div class="card-memo">📝 ${escHtml(o.memo)}</div>`
    : '';

  return `
    <div class="card" id="card-${o.mgmtId}"
      style="border-color:${meta.color};background:${meta.bg}"
      onclick="openModal('${o.mgmtId}')">
      <div class="card-top"
        style="background:linear-gradient(90deg,${gradStart},${gradEnd})">
        <span>${dept.icon} ${dept.label}</span>
        <span>👤 ${escHtml(o.assignee || '未設定')}</span>
      </div>
      <div class="card-body">
        <div class="card-client">${escHtml(o.client)}</div>
        <div class="card-no">${escHtml(o.orderNo)}</div>
        <div class="card-status-row">
          <span class="status-pill"
            style="background:${meta.color}22;color:${meta.color}">
            ${meta.icon} ${o.status}
          </span>
          <span class="card-type">${escHtml(o.orderType)}</span>
        </div>
        <div class="progress-bg">
          <div class="progress-bar"
            style="width:${meta.progress}%;background:linear-gradient(90deg,${gradStart},${gradEnd})">
          </div>
        </div>
        <div class="card-foot">
          <span>${amt}</span>
          <span class="card-machine">${escHtml(machine)}</span>
        </div>
        ${memoHtml}
      </div>
    </div>`;
}

function renderSide() {
  const el = document.getElementById('side-content');
  if (currentTab === 'dept') {
    const byDept = {};
    DEPTS.forEach(d => { byDept[d.id] = { n:0, amt:0 }; });
    orders.forEach(o => {
      const did = STATUS_META[o.status]?.deptId || 'sales';
      byDept[did].n++;
      byDept[did].amt += Number(o.orderAmount) || 0;
    });
    el.innerHTML = DEPTS.map(d => {
      const info = byDept[d.id];
      const glow = info.n > 0 ? `box-shadow:0 0 10px ${d.color}99` : '';
      const amtHtml = info.amt > 0
        ? `<div class="side-sub">¥${info.amt.toLocaleString()}</div>`
        : '';
      return `<div class="side-row">
        <span class="side-icon">${d.icon}</span>
        <div class="side-info">
          <div class="side-label" style="color:${d.color}">${d.label}</div>
          ${amtHtml}
        </div>
        <div class="side-badge"
          style="background:${info.n>0?d.color:'#334155'};${glow}">
          ${info.n}
        </div>
      </div>`;
    }).join('');
  } else {
    const byPerson = {};
    orders.forEach(o => {
      const name = o.assignee || '未設定';
      const did  = STATUS_META[o.status]?.deptId || 'sales';
      if (!byPerson[name]) byPerson[name] = { n:0, deptId:did };
      byPerson[name].n++;
      byPerson[name].deptId = did;
    });
    const sorted = Object.entries(byPerson).sort((a,b) => b[1].n - a[1].n);
    el.innerHTML = sorted.map(([name, info]) => {
      const d = DEPT_MAP[info.deptId] || DEPTS[0];
      return `<div class="side-row">
        <div class="person-avatar"
          style="background:linear-gradient(135deg,${d.color},${d.color}88)">
          ${name[0]}
        </div>
        <div class="side-info">
          <div class="side-label" style="color:#e2e8f0;font-size:11px">${escHtml(name)}</div>
          <div class="side-sub" style="color:${d.color}">${d.icon} ${d.label}</div>
        </div>
        <div class="side-badge" style="background:${d.color};width:22px;height:22px;font-size:11px">
          ${info.n}
        </div>
      </div>`;
    }).join('');
  }
}

function updateHeader() {
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  const conn  = document.getElementById('hdr-conn');
  if (connected) {
    dot.style.background = '#10b981';
    dot.className = 'conn-dot pulse';
    label.textContent = `GAS接続 (${countdown}s)`;
    conn.style.background = '#10b98115';
    conn.style.border = '1px solid #10b98133';
    label.style.color = '#10b981';
  } else {
    dot.style.background = '#6b7280';
    dot.className = 'conn-dot';
    label.textContent = 'デモモード';
    conn.style.background = '#6b728015';
    conn.style.border = '1px solid #6b728033';
    label.style.color = '#94a3b8';
  }
}

function updateLastSync() {
  const el = document.getElementById('last-sync');
  if (el) el.textContent = new Date().toLocaleTimeString('ja-JP');
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-dept').className   = 'side-tab' + (tab==='dept'?' active':'');
  document.getElementById('tab-person').className = 'side-tab' + (tab==='person'?' active':'');
  renderSide();
}

// ============================================================
// モーダル
// ============================================================
function openModal(mgmtId) {
  const o = orders.find(x => x.mgmtId === mgmtId);
  if (!o) return;
  currentOrder  = o;
  currentStatus = o.status;

  const meta = STATUS_META[o.status] || STATUS_META['作成予定'];
  const dept = DEPT_MAP[meta.deptId] || DEPTS[0];

  // ヘッダー
  const hdr = document.getElementById('modal-hdr');
  hdr.style.background = `linear-gradient(135deg, ${dept.color}, ${meta.color})`;
  document.getElementById('m-sub').textContent  = `${o.orderNo} / ${o.orderType}`;
  document.getElementById('m-main').textContent = o.client;
  document.getElementById('m-sub2').textContent = o.machineName || o.modelCode || '';

  // ボールの場所
  const locBox = document.getElementById('m-location');
  locBox.style.background = dept.color + '18';
  locBox.style.border = `1px solid ${dept.color}33`;
  document.getElementById('m-loc-icon').textContent  = dept.icon;
  document.getElementById('m-loc-dept').textContent  = `ボールは ${dept.label} にあります`;
  document.getElementById('m-loc-dept').style.color  = dept.color;
  document.getElementById('m-loc-stage').textContent = `${STAGES[meta.stageIdx]?.label} フェーズ / 進捗 ${meta.progress}%`;
  document.getElementById('m-loc-pct').textContent   = `${meta.progress}%`;
  document.getElementById('m-loc-pct').style.color   = dept.color;

  // ステータスグリッド
  renderStatusGrid(dept, meta);

  // 入力値セット
  document.getElementById('m-assignee').value = o.assignee || '';
  document.getElementById('m-memo').value      = o.memo     || '';

  // 送信ボタン
  updateSubmitBtn(dept, meta);

  // 表示
  document.getElementById('modal-overlay').className = 'open';
}

function renderStatusGrid(activeDept, activeMeta) {
  const grid = document.getElementById('m-status-grid');
  grid.innerHTML = Object.entries(STATUS_META).map(([s, m]) => {
    const isSelected = s === currentStatus;
    const style = isSelected
      ? `border-color:${m.color};background:${m.color}22;color:${m.color}`
      : 'border-color:#334155;background:#0f172a;color:#475569';
    return `<button class="status-btn ${isSelected?'selected':''}"
      style="${style}" onclick="selectStatus('${s}')">
      ${m.icon} ${s}
    </button>`;
  }).join('');
}

function selectStatus(s) {
  currentStatus = s;
  const meta = STATUS_META[s] || STATUS_META['作成予定'];
  const dept = DEPT_MAP[meta.deptId] || DEPTS[0];

  // ボールの場所更新
  document.getElementById('m-loc-icon').textContent  = dept.icon;
  document.getElementById('m-loc-dept').textContent  = `ボールは ${dept.label} にあります`;
  document.getElementById('m-loc-dept').style.color  = dept.color;
  document.getElementById('m-loc-stage').textContent = `${STAGES[meta.stageIdx]?.label} フェーズ / 進捗 ${meta.progress}%`;
  document.getElementById('m-loc-pct').textContent   = `${meta.progress}%`;
  document.getElementById('m-loc-pct').style.color   = dept.color;
  const locBox = document.getElementById('m-location');
  locBox.style.background = dept.color + '18';
  locBox.style.border = `1px solid ${dept.color}33`;

  renderStatusGrid(dept, meta);
  updateSubmitBtn(dept, meta);
}

function updateSubmitBtn(dept, meta) {
  const btn = document.getElementById('m-submit');
  btn.style.background = `linear-gradient(90deg, ${dept.color}, ${meta.color})`;
  btn.style.boxShadow  = `0 4px 16px ${dept.color}66`;
}

function closeModal() {
  document.getElementById('modal-overlay').className = '';
  currentOrder = null;
}
function closeModalOnBg(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function submitModal() {
  if (!currentOrder || saving) return;
  saving = true;
  const btn = document.getElementById('m-submit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⏳</span> GASに書き込み中...';

  const assignee = document.getElementById('m-assignee').value;
  const memo     = document.getElementById('m-memo').value;
  const mgmtId   = currentOrder.mgmtId;
  const status   = currentStatus;

  // ローカル即時反映（UIをすぐ動かす）
  orders = orders.map(o =>
    o.mgmtId === mgmtId ? { ...o, status, assignee, memo } : o
  );
  renderAll();
  flashCard(mgmtId);
  closeModal();
  showToast(`${currentOrder.client} → ${status}`);
  saving = false;
  btn.disabled = false;

  // GAS書き込み（非同期、バックグラウンド）
  saveOrder(mgmtId, status, assignee, memo, function(r) {
    // 書き込み後に再同期して確定
    setTimeout(() => fetchOrders(true), 1000);
  });
}

// ============================================================
// ユーティリティ
// ============================================================
function flashCard(mgmtId) {
  const el = document.getElementById(`card-${mgmtId}`);
  if (!el) return;
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 1000);
}

function showToast(msg) {
  const el = document.getElementById('hdr-toast');
  el.textContent = '✅ ' + msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
