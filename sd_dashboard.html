<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>基板進捗管理 | サン電子</title>
<style>
:root{
  --bg:#f0f2f5;--card:#fff;--border:#e0e0e0;
  --primary:#1a73e8;--plight:#e8f0fe;
  --text:#202124;--sub:#5f6368;
  --ok:#34a853;--warn:#fbbc04;--danger:#ea4335;
  --design:#9c27b0;--purchase:#1565c0;--sales:#00796b;--qc:#e65100;
  --r:8px;--sh:0 1px 4px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Google Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
header{background:#1a237e;color:white;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:12px;}
.logo{font-weight:700;font-size:15px;white-space:nowrap;}
.nav-tabs{display:flex;gap:4px;flex:1;justify-content:center;}
.nav-tab{padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.8);border:none;background:none;white-space:nowrap;}
.nav-tab.active,.nav-tab:hover{background:rgba(255,255,255,.2);color:white;}
.page{display:none;padding:16px 20px;max-width:1600px;margin:0 auto;}
.page.active{display:block;}

/* サマリー */
.sum-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.sum-card{background:var(--card);border-radius:var(--r);padding:12px 14px;box-shadow:var(--sh);}
.sum-card .lbl{font-size:11px;color:var(--sub);margin-bottom:2px;}
.sum-card .val{font-size:26px;font-weight:600;}

/* 部署タブ */
.dept-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.dept-tab{padding:6px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;border:2px solid transparent;transition:.15s;}
.dept-tab.design {background:#f3e5f5;color:var(--design);}
.dept-tab.design.active {border-color:var(--design);}
.dept-tab.purchase{background:#e3f2fd;color:var(--purchase);}
.dept-tab.purchase.active{border-color:var(--purchase);}
.dept-tab.sales  {background:#e0f2f1;color:var(--sales);}
.dept-tab.sales.active  {border-color:var(--sales);}
.dept-tab.qc     {background:#fff3e0;color:var(--qc);}
.dept-tab.qc.active     {border-color:var(--qc);}
.dept-tab.all    {background:#f1f3f4;color:var(--sub);}
.dept-tab.all.active    {border-color:#888;}

/* フィルターバー */
.fbar{background:var(--card);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;box-shadow:var(--sh);}
.sbox{flex:1;min-width:200px;position:relative;}
.sbox input{width:100%;padding:7px 12px 7px 30px;border:1px solid var(--border);border-radius:20px;font-size:13px;outline:none;}
.sbox::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;}
select{padding:6px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:white;outline:none;cursor:pointer;}
.btn{padding:7px 14px;border-radius:var(--r);border:none;cursor:pointer;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:5px;transition:.15s;}
.btn-primary{background:var(--primary);color:white;}.btn-primary:hover{background:#1557b0;}
.btn-outline{background:white;color:var(--primary);border:1px solid var(--border);}.btn-outline:hover{background:var(--plight);}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-success{background:#e6f4ea;color:#137333;border:1px solid #a8d5b5;}
.btn-danger{background:#fce8e6;color:#c5221f;border:1px solid #f5c6c6;}

/* バッジ */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap;}
.b-ok{background:#e6f4ea;color:#137333;}
.b-warn{background:#fff8e1;color:#e65100;}
.b-danger{background:#fce8e6;color:#c5221f;animation:pulse .8s infinite;}
.b-over{background:#c5221f;color:white;}
.b-new{background:#f3e5f5;color:var(--design);}
.b-exist{background:#e3f2fd;color:var(--purchase);}
.b-high{background:#fce8e6;color:#c5221f;}
.b-mid{background:#fff8e1;color:#e65100;}
.b-low{background:#e6f4ea;color:#137333;}
.b-done{background:#e6f4ea;color:#137333;}
.b-ng{background:#c5221f;color:white;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* 機種ビュー */
.model-grid{display:flex;flex-direction:column;gap:12px;}
.model-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.model-header{padding:12px 16px;background:#f8f9fa;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;}
.model-code{font-weight:700;font-size:15px;}
.model-name{font-size:13px;color:var(--sub);}
.model-progress{font-size:12px;color:var(--sub);}
.board-table{width:100%;border-collapse:collapse;}
.board-table th{padding:7px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);border-bottom:1px solid var(--border);background:#fafafa;white-space:nowrap;}
.board-table td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.board-table tr:last-child td{border-bottom:none;}
.board-table tr:hover{background:#f8f9fa;cursor:pointer;}

/* 部署ビュー カード */
.dept-cards{display:flex;flex-wrap:wrap;gap:10px;}
.bcard{background:white;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;width:280px;cursor:pointer;transition:box-shadow .15s;}
.bcard:hover{box-shadow:0 2px 10px rgba(0,0,0,.15);}
.bcard.sla-over{border-left:3px solid var(--danger);background:#fff9f9;}
.bcard.sla-danger{border-left:3px solid var(--danger);}
.bcard.sla-warn{border-left:3px solid var(--warn);}
.bc-id{font-size:11px;color:var(--sub);margin-bottom:3px;}
.bc-model{font-weight:600;font-size:13px;margin-bottom:2px;}
.bc-board{font-size:12px;color:var(--sub);margin-bottom:6px;}
.bc-phase{font-size:12px;border-radius:4px;padding:2px 6px;display:inline-block;margin-bottom:5px;}
.bc-phase.design {background:#f3e5f5;color:var(--design);}
.bc-phase.purchase{background:#e3f2fd;color:var(--purchase);}
.bc-phase.sales  {background:#e0f2f1;color:var(--sales);}
.bc-phase.qc     {background:#fff3e0;color:var(--qc);}
.bc-step{font-size:12px;color:var(--sub);margin-bottom:4px;}
.bc-sla{font-size:11px;margin-top:4px;}
.bc-prog{height:3px;background:#f1f3f4;border-radius:2px;margin-top:8px;}
.bc-prog-bar{height:100%;background:var(--primary);border-radius:2px;}

/* モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:12px;width:92%;max-width:740px;max-height:90vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.25);}
.modal-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--sub);}
.modal-body{padding:18px 20px;}
.ff label{font-size:11px;font-weight:600;color:var(--sub);display:block;margin-bottom:3px;}
.ff input,.ff select,.ff textarea{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;outline:none;}
.ff input:focus,.ff select:focus{border-color:var(--primary);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.timeline{padding-left:22px;position:relative;}
.timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1px;background:var(--border);}
.tl-item{position:relative;margin-bottom:14px;}
.tl-dot{position:absolute;left:-18px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--primary);border:2px solid white;box-shadow:0 0 0 1px var(--primary);}
.tl-dot.done{background:var(--ok);}
.tl-dot.ng{background:var(--danger);}
.tl-box{background:#f8f9fa;border-radius:6px;padding:7px 10px;}
.tl-action{font-weight:600;font-size:13px;}
.tl-meta{font-size:11px;color:var(--sub);margin-top:2px;}

/* フロー進捗ステッパー */
.phase-stepper{display:flex;align-items:center;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.phase-step{display:flex;flex-direction:column;align-items:center;min-width:80px;}
.phase-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid var(--border);background:white;color:var(--sub);}
.phase-dot.done{background:var(--ok);border-color:var(--ok);color:white;}
.phase-dot.current{background:var(--primary);border-color:var(--primary);color:white;}
.phase-line{flex:1;height:2px;background:var(--border);min-width:20px;}
.phase-line.done{background:var(--ok);}
.phase-label{font-size:10px;color:var(--sub);margin-top:3px;text-align:center;max-width:80px;}

.loading{text-align:center;padding:40px;color:var(--sub);}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#323232;color:white;padding:10px 20px;border-radius:24px;font-size:13px;z-index:999;transition:transform .3s;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header>
  <div class="logo">🔬 サン電子 基板進捗管理</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('model')">🗂 機種ビュー</button>
    <button class="nav-tab" onclick="showPage('dept')">🏢 部署ビュー</button>
    <button class="nav-tab" onclick="showPage('board')">📋 基板一覧</button>
  </div>
  <div style="display:flex;gap:8px;flex-shrink:0;">
    <button class="btn btn-outline" style="background:transparent;border-color:rgba(255,255,255,.4);color:white;padding:6px 10px;" onclick="loadAll()">🔄</button>
    <button class="btn" style="background:white;color:#1a237e;font-weight:600;padding:6px 12px;" onclick="openNewModal()">＋ 基板登録</button>
  </div>
</header>

<!-- サマリー -->
<div style="padding:12px 20px 0;max-width:1600px;margin:0 auto;">
  <div class="sum-grid">
    <div class="sum-card"><div class="lbl">進行中 基板</div><div class="val" style="color:var(--primary)" id="s-active">—</div></div>
    <div class="sum-card"><div class="lbl">SLA超過</div><div class="val" style="color:var(--danger)" id="s-over">—</div></div>
    <div class="sum-card"><div class="lbl">危険（8h以内）</div><div class="val" style="color:#e65100" id="s-danger">—</div></div>
    <div class="sum-card"><div class="lbl">新規設計フロー</div><div class="val" style="color:var(--design)" id="s-new">—</div></div>
    <div class="sum-card"><div class="lbl">既存流用フロー</div><div class="val" style="color:var(--purchase)" id="s-exist">—</div></div>
  </div>
</div>

<!-- ===== 機種ビュー ===== -->
<div id="page-model" class="page active">
  <div class="fbar">
    <div class="sbox"><input type="text" id="m-search" placeholder="機種コード・機種名・顧客名で検索..." oninput="renderModel()"></div>
    <select id="m-status" onchange="renderModel()">
      <option value="">すべてのステータス</option>
      <option value="進行中">進行中</option><option value="完了">完了</option>
    </select>
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('m-search').value='';document.getElementById('m-status').value='';renderModel()">クリア</button>
  </div>
  <div id="model-container"><div class="loading"><div class="spinner"></div></div></div>
</div>

<!-- ===== 部署ビュー ===== -->
<div id="page-dept" class="page">
  <div class="dept-tabs">
    <button class="dept-tab all active" onclick="filterDept('')">すべて</button>
    <button class="dept-tab design"   onclick="filterDept('設計課')">設計課</button>
    <button class="dept-tab purchase" onclick="filterDept('資材購買課')">資材購買課</button>
    <button class="dept-tab sales"    onclick="filterDept('営業課')">営業課</button>
    <button class="dept-tab qc"       onclick="filterDept('品質管理課')">品質管理課</button>
  </div>
  <div id="dept-container"><div class="loading"><div class="spinner"></div></div></div>
</div>

<!-- ===== 基板一覧 ===== -->
<div id="page-board" class="page">
  <div class="fbar">
    <div class="sbox"><input type="text" id="b-search" placeholder="基板ID・機種コードで検索..." oninput="renderBoardList()"></div>
    <select id="b-flow" onchange="renderBoardList()">
      <option value="">すべてのフロー</option>
      <option value="新規設計">新規設計</option>
      <option value="既存流用">既存流用</option>
    </select>
    <select id="b-btype" onchange="renderBoardList()">
      <option value="">すべての種別</option>
    </select>
    <select id="b-status" onchange="renderBoardList()">
      <option value="">すべてのステータス</option>
      <option value="進行中">進行中</option><option value="完了">完了</option>
      <option value="NG差し戻し">NG差し戻し</option><option value="保留">保留</option>
    </select>
  </div>
  <div style="background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;">
    <table class="board-table" id="board-table">
      <thead>
        <tr>
          <th>機種</th><th>基板ID</th><th>種別</th><th>フロー</th>
          <th>現在フェーズ</th><th>現在ステップ</th><th>ボール所在</th>
          <th>納品予定</th><th>SLA</th><th>QC</th><th>ステータス</th>
        </tr>
      </thead>
      <tbody id="board-tbody"></tbody>
    </table>
  </div>
</div>

<!-- ===== 詳細モーダル ===== -->
<div class="modal-overlay" id="detail-modal" onclick="if(event.target===this)closeModal('detail-modal')">
  <div class="modal">
    <div class="modal-head">
      <h3 id="detail-title">基板詳細</h3>
      <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<!-- ===== 新規登録モーダル ===== -->
<div class="modal-overlay" id="new-modal" onclick="if(event.target===this)closeModal('new-modal')">
  <div class="modal" style="max-width:580px;">
    <div class="modal-head">
      <h3>＋ 基板フロー登録</h3>
      <button class="modal-close" onclick="closeModal('new-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="frow">
        <div class="ff"><label>機種コード *</label><input type="text" id="n-mcode" placeholder="例: A77"></div>
        <div class="ff"><label>機種名</label><input type="text" id="n-mname" placeholder="例: A77型遊技機"></div>
      </div>
      <div class="frow">
        <div class="ff"><label>基板ID *</label><input type="text" id="n-bid" placeholder="例: M2601A"></div>
        <div class="ff"><label>基板種別 *</label>
          <select id="n-btype">
            <option value="">選択</option>
            <option>M基板</option><option>D基板</option><option>DE基板</option>
            <option>E基板</option><option>C基板</option><option>S基板</option><option>PCB</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div class="ff"><label>フロー種別 *</label>
          <select id="n-flow">
            <option value="">選択してください</option>
            <option value="新規設計">新規設計（設計から開始）</option>
            <option value="既存流用">既存流用（製造・納品のみ）</option>
          </select>
        </div>
        <div class="ff"><label>優先度</label>
          <select id="n-pri"><option value="中">中</option><option value="高">高</option><option value="低">低</option></select>
        </div>
      </div>
      <div class="frow">
        <div class="ff"><label>見積番号</label><input type="text" id="n-quote" placeholder="例: 2026-001"></div>
        <div class="ff"><label>注文書番号</label><input type="text" id="n-order" placeholder="例: 56789"></div>
      </div>
      <div class="frow">
        <div class="ff"><label>納品予定日</label><input type="date" id="n-deliv"></div>
        <div class="ff"><label>顧客名</label><input type="text" id="n-client" placeholder="例: ○○遊技株式会社"></div>
      </div>
      <div class="ff" style="margin-bottom:14px;"><label>登録者</label><input type="text" id="n-actor" placeholder="あなたの名前"></div>
      <div class="ff" style="margin-bottom:14px;"><label>メモ</label><textarea id="n-memo" rows="2" style="resize:vertical;"></textarea></div>
      <div style="text-align:right;">
        <button class="btn btn-outline" onclick="closeModal('new-modal')">キャンセル</button>
        <button class="btn btn-primary" onclick="submitNew()" style="margin-left:8px;">🚀 フロー開始</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var _all = [];
var _deptFilter = '';

async function gasCall(fn, arg) {
  return new Promise(function(res, rej) {
    google.script.run.withSuccessHandler(res).withFailureHandler(rej)[fn](arg);
  });
}

async function loadAll() {
  try {
    var r = await gasCall('sdGetBoardProgress', {});
    if (r.success) _all = r.items;
    updateSummary();
    renderModel();
    renderDept();
    renderBoardList();
    populateBoardTypeFilter();
  } catch(e) { showToast('読み込みエラー: ' + e.message); }
}

function updateSummary() {
  var active  = _all.filter(function(i) { return i.status === '進行中'; });
  document.getElementById('s-active').textContent = active.length;
  document.getElementById('s-over').textContent   = active.filter(function(i) { return i.slaStatus === 'overdue'; }).length;
  document.getElementById('s-danger').textContent  = active.filter(function(i) { return i.slaStatus === 'danger'; }).length;
  document.getElementById('s-new').textContent    = active.filter(function(i) { return i.flowType === '新規設計'; }).length;
  document.getElementById('s-exist').textContent  = active.filter(function(i) { return i.flowType === '既存流用'; }).length;
}

function populateBoardTypeFilter() {
  var types = [...new Set(_all.map(function(i) { return i.boardType; }).filter(Boolean))];
  var sel = document.getElementById('b-btype');
  sel.innerHTML = '<option value="">すべての種別</option>';
  types.forEach(function(t) {
    var o = document.createElement('option'); o.value = t; o.textContent = t; sel.appendChild(o);
  });
}

// ===== 機種ビュー =====
function renderModel() {
  var q  = document.getElementById('m-search').value.toLowerCase();
  var st = document.getElementById('m-status').value;

  var items = _all.filter(function(i) {
    if (st && i.status !== st) return false;
    if (q && (i.modelCode + i.modelName).toLowerCase().indexOf(q) < 0) return false;
    return true;
  });

  var modelMap = {};
  items.forEach(function(i) {
    if (!modelMap[i.modelCode]) modelMap[i.modelCode] = { code: i.modelCode, name: i.modelName, boards: [], worst: 'ok', done: 0 };
    modelMap[i.modelCode].boards.push(i);
    if (i.status === '完了') modelMap[i.modelCode].done++;
    var rank = { overdue: 0, danger: 1, warning: 2, ok: 3 };
    if ((rank[i.slaStatus] || 3) < (rank[modelMap[i.modelCode].worst] || 3)) modelMap[i.modelCode].worst = i.slaStatus;
  });

  var models = Object.values(modelMap);
  if (!models.length) { document.getElementById('model-container').innerHTML = '<div class="loading" style="color:var(--sub);">該当機種なし</div>'; return; }

  var html = '<div class="model-grid">';
  models.forEach(function(m) {
    var slaCol = m.worst === 'overdue' ? 'var(--danger)' : m.worst === 'danger' ? '#e65100' : m.worst === 'warning' ? '#f9a825' : 'var(--ok)';
    html += '<div class="model-card">' +
      '<div class="model-header" onclick="toggleModelBoards(\'' + esc(m.code) + '\')">' +
        '<div style="display:flex;align-items:center;gap:12px;">' +
          '<div style="width:8px;height:8px;border-radius:50%;background:' + slaCol + ';flex-shrink:0;"></div>' +
          '<div><span class="model-code">' + esc(m.code) + '</span> <span class="model-name">' + esc(m.name) + '</span></div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:10px;">' +
          '<span class="model-progress">' + m.done + '/' + m.boards.length + ' 基板完了</span>' +
          '<span style="color:var(--sub);font-size:12px;">▼</span>' +
        '</div>' +
      '</div>' +
      '<div id="boards-' + esc(m.code) + '">' +
      '<table class="board-table"><thead><tr><th>基板ID</th><th>種別</th><th>フロー</th><th>現在フェーズ</th><th>現在ステップ</th><th>ボール</th><th>納品予定</th><th>SLA</th><th>ステータス</th></tr></thead><tbody>' +
      m.boards.map(function(b) { return renderBoardRow(b); }).join('') +
      '</tbody></table></div></div>';
  });
  html += '</div>';
  document.getElementById('model-container').innerHTML = html;
}

function toggleModelBoards(code) {
  var el = document.getElementById('boards-' + code);
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
}

// ===== 部署ビュー =====
function filterDept(dept) {
  _deptFilter = dept;
  document.querySelectorAll('.dept-tab').forEach(function(t) { t.classList.remove('active'); });
  var maps = { '': 'all', '設計課': 'design', '資材購買課': 'purchase', '営業課': 'sales', '品質管理課': 'qc' };
  var btn = document.querySelector('.dept-tab.' + (maps[dept] || 'all'));
  if (btn) btn.classList.add('active');
  renderDept();
}

function renderDept() {
  var items = _all.filter(function(i) {
    if (i.status !== '進行中') return false;
    if (_deptFilter && i.ballDept !== _deptFilter) return false;
    return true;
  });

  if (!items.length) { document.getElementById('dept-container').innerHTML = '<div class="loading" style="color:var(--sub);">該当案件なし</div>'; return; }

  var deptClassMap = { '設計課': 'design', '資材購買課': 'purchase', '営業課': 'sales', '品質管理課': 'qc' };
  var html = '<div class="dept-cards">';
  items.forEach(function(b) {
    var sc = b.slaStatus === 'overdue' ? 'sla-over' : b.slaStatus === 'danger' ? 'sla-danger' : b.slaStatus === 'warning' ? 'sla-warn' : '';
    var slaBadge = b.slaStatus === 'overdue' ? '<span class="badge b-over">期限超過</span>'
      : b.slaStatus === 'danger'  ? '<span class="badge b-danger">' + b.hoursToSla + 'h</span>'
      : b.slaStatus === 'warning' ? '<span class="badge b-warn">' + b.hoursToSla + 'h</span>'
      : b.hoursToSla !== null ? '<span class="badge b-ok">' + b.hoursToSla + 'h</span>' : '';
    var pct = b.totalPhases > 0 ? Math.round(b.phaseProgress / b.totalPhases * 100) : 0;
    var dc = deptClassMap[b.ballDept] || '';
    html += '<div class="bcard ' + sc + '" onclick="openDetail(\'' + b.progressId + '\')">' +
      '<div class="bc-id">' + b.progressId + ' <span class="badge ' + (b.flowType === '新規設計' ? 'b-new' : 'b-exist') + '">' + b.flowType + '</span></div>' +
      '<div class="bc-model">' + esc(b.modelCode) + ' — ' + esc(b.modelName) + '</div>' +
      '<div class="bc-board">' + esc(b.boardId) + '（' + esc(b.boardType) + '）</div>' +
      '<span class="bc-phase ' + dc + '">' + esc(b.phaseLabel) + '</span>' +
      '<div class="bc-step">→ ' + esc(b.stepLabel) + '</div>' +
      '<div class="bc-sla">' + slaBadge + ' 滞留: ' + b.hoursInPhase + 'h</div>' +
      '<div class="bc-prog"><div class="bc-prog-bar" style="width:' + pct + '%"></div></div>' +
      '</div>';
  });
  html += '</div>';
  document.getElementById('dept-container').innerHTML = html;
}

// ===== 基板一覧 =====
function renderBoardList() {
  var q  = document.getElementById('b-search').value.toLowerCase();
  var fl = document.getElementById('b-flow').value;
  var bt = document.getElementById('b-btype').value;
  var st = document.getElementById('b-status').value;
  var items = _all.filter(function(i) {
    if (fl && i.flowType !== fl) return false;
    if (bt && i.boardType !== bt) return false;
    if (st && i.status !== st) return false;
    if (q && (i.boardId + i.modelCode + i.modelName).toLowerCase().indexOf(q) < 0) return false;
    return true;
  });
  document.getElementById('board-tbody').innerHTML = items.map(renderBoardRow).join('') ||
    '<tr><td colspan="11" style="padding:40px;text-align:center;color:var(--sub);">該当なし</td></tr>';
}

function renderBoardRow(b) {
  var slaLabels = {
    ok: '<span class="badge b-ok">正常</span>',
    warning: '<span class="badge b-warn">警告</span>',
    danger: '<span class="badge b-danger">危険</span>',
    overdue: '<span class="badge b-over">超過</span>'
  };
  var stLabels = {
    '進行中': '<span class="badge" style="background:#e8f0fe;color:#1a73e8;">進行中</span>',
    '完了':   '<span class="badge b-done">完了</span>',
    'NG差し戻し': '<span class="badge b-ng">NG</span>',
    '保留':   '<span class="badge b-warn">保留</span>',
  };
  return '<tr onclick="openDetail(\'' + b.progressId + '\')" style="border-bottom:1px solid var(--border);">' +
    '<td style="font-weight:600;">' + esc(b.modelCode) + '<div style="font-size:11px;color:var(--sub);">' + esc(b.modelName) + '</div></td>' +
    '<td style="font-weight:500;">' + esc(b.boardId) + '</td>' +
    '<td>' + esc(b.boardType) + '</td>' +
    '<td><span class="badge ' + (b.flowType === '新規設計' ? 'b-new' : 'b-exist') + '">' + b.flowType + '</span></td>' +
    '<td>' + esc(b.phaseLabel) + '</td>' +
    '<td style="color:var(--sub);">' + esc(b.stepLabel) + '</td>' +
    '<td><strong>' + esc(b.ballDept) + '</strong></td>' +
    '<td>' + (b.deliveryDate || '—') + (b.daysToDeliv !== null ? '<div style="font-size:10px;color:' + (b.daysToDeliv < 0 ? 'var(--danger)' : 'var(--sub)') + ';">' + b.daysToDeliv + '日</div>' : '') + '</td>' +
    '<td>' + (slaLabels[b.slaStatus] || '') + '</td>' +
    '<td>' + (b.qcResult ? '<span class="badge ' + (b.qcResult === '合格' ? 'b-done' : b.qcResult === '不合格' ? 'b-ng' : 'b-warn') + '">' + b.qcResult + '</span>' : '—') + '</td>' +
    '<td>' + (stLabels[b.status] || b.status) + '</td>' +
    '</tr>';
}

// ===== 詳細モーダル =====
async function openDetail(progressId) {
  var b = _all.find(function(i) { return i.progressId === progressId; });
  if (!b) return;
  document.getElementById('detail-title').textContent = b.boardId + ' — ' + b.modelCode + ' ' + b.modelName;
  document.getElementById('detail-body').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  document.getElementById('detail-modal').classList.add('open');

  var histRes = await gasCall('sdGetHistory', progressId);

  // フロー進捗ステッパー
  var flowDef = { '新規設計': <?= JSON.stringify(WORKFLOW_DEFS['新規設計'].phases.map(function(p){return{id:p.id,label:p.label}})) ?>,
                  '既存流用': <?= JSON.stringify(WORKFLOW_DEFS['既存流用'].phases.map(function(p){return{id:p.id,label:p.label}})) ?> };
  var phases = flowDef[b.flowType] || [];
  var curPhaseIdx = phases.findIndex(function(p) { return p.id === b.currentPhase; });
  var stepperHtml = '<div class="phase-stepper">';
  phases.forEach(function(p, idx) {
    var isDone = idx < curPhaseIdx || b.status === '完了';
    var isCur  = idx === curPhaseIdx && b.status !== '完了';
    if (idx > 0) stepperHtml += '<div class="phase-line' + (isDone ? ' done' : '') + '"></div>';
    stepperHtml += '<div class="phase-step"><div class="phase-dot' + (isDone ? ' done' : isCur ? ' current' : '') + '">' + (isDone ? '✓' : idx + 1) + '</div><div class="phase-label">' + esc(p.label) + '</div></div>';
  });
  stepperHtml += '</div>';

  // 履歴
  var histHtml = '';
  if (histRes.success && histRes.items.length) {
    histHtml = '<div class="timeline">' + histRes.items.map(function(h) {
      var cls = h.action.indexOf('完了') >= 0 ? 'done' : h.action.indexOf('不合格') >= 0 || h.action.indexOf('NG') >= 0 ? 'ng' : '';
      return '<div class="tl-item"><div class="tl-dot ' + cls + '"></div>' +
        '<div class="tl-box"><div class="tl-action">' + esc(h.action) + '</div>' +
        '<div class="tl-meta">' + h.timestamp + ' 【' + esc(h.dept) + '】' + esc(h.actor) + (h.duration ? ' (' + h.duration + 'h)' : '') + '</div>' +
        (h.comment ? '<div style="font-size:11px;color:var(--sub);margin-top:2px;">' + esc(h.comment) + '</div>' : '') +
        '</div></div>';
    }).join('') + '</div>';
  } else { histHtml = '<div style="color:var(--sub);font-size:13px;">履歴なし</div>'; }

  var slaColors = { ok: 'var(--ok)', warning: '#e65100', danger: 'var(--danger)', overdue: 'var(--danger)' };

  document.getElementById('detail-body').innerHTML =
    stepperHtml +
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;font-size:13px;">' +
      '<div><div style="font-size:11px;color:var(--sub);">ボール所在</div><div style="font-weight:700;">【' + esc(b.ballDept) + '】' + esc(b.ballOwner) + '</div></div>' +
      '<div><div style="font-size:11px;color:var(--sub);">現在ステップ</div><div>' + esc(b.stepLabel) + '</div></div>' +
      '<div><div style="font-size:11px;color:var(--sub);">SLA残時間</div><div style="font-weight:600;color:' + (slaColors[b.slaStatus] || 'var(--sub)') + ';">' + (b.hoursToSla !== null ? b.hoursToSla + '時間' : '—') + '</div></div>' +
      '<div><div style="font-size:11px;color:var(--sub);">納品予定日</div><div>' + (b.deliveryDate || '未定') + (b.daysToDeliv !== null ? '（' + b.daysToDeliv + '日後）' : '') + '</div></div>' +
      '<div><div style="font-size:11px;color:var(--sub);">注文書番号</div><div>' + (b.orderNo || '—') + '</div></div>' +
      '<div><div style="font-size:11px;color:var(--sub);">ロット番号</div><div>' + (b.lotNumber || '—') + '</div></div>' +
    '</div>' +
    (b.status === '進行中' ? '<div style="background:#f8f9fa;border-radius:8px;padding:12px;margin-bottom:14px;">' +
      '<div style="font-size:12px;font-weight:600;color:var(--sub);margin-bottom:8px;">ステップを完了してボールを渡す</div>' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">' +
        '<div style="flex:1;min-width:140px;"><label style="font-size:11px;color:var(--sub);display:block;margin-bottom:3px;">実施者名 *</label><input type="text" id="a-actor" placeholder="あなたの名前" style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;"></div>' +
        '<div style="flex:2;"><label style="font-size:11px;color:var(--sub);display:block;margin-bottom:3px;">コメント・引継ぎメモ</label><input type="text" id="a-comment" placeholder="次担当者への引継ぎ内容" style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;"></div>' +
      '</div>' +
      (b.ballDept === '品質管理課' ?
        '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">' +
          '<div><label style="font-size:11px;color:var(--sub);display:block;margin-bottom:3px;">ロット番号</label><input type="text" id="a-lot" placeholder="例: LOT2604-001" value="' + esc(b.lotNumber || '') + '" style="padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;"></div>' +
          '<div><label style="font-size:11px;color:var(--sub);display:block;margin-bottom:3px;">QC判定</label><select id="a-qc" style="padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;"><option value="">—</option><option value="合格">✅ 合格</option><option value="不合格">❌ 不合格</option><option value="保留">⏸ 保留</option></select></div>' +
        '</div>' : '') +
      '<div style="display:flex;gap:8px;">' +
        '<button class="btn btn-primary" onclick="advance(\'' + progressId + '\')" style="flex:1;">▶ 次のステップへ（ボールを渡す）</button>' +
        '<button class="btn btn-outline" onclick="holdBoard(\'' + progressId + '\')" style="color:#e65100;border-color:#e65100;">⏸ 保留</button>' +
      '</div>' +
    '</div>' : '') +
    '<div style="font-size:12px;font-weight:600;color:var(--sub);margin-bottom:8px;border-top:1px solid var(--border);padding-top:12px;">フロー履歴</div>' +
    histHtml;
}

async function advance(progressId) {
  var actor   = (document.getElementById('a-actor') || {}).value || '';
  var comment = (document.getElementById('a-comment') || {}).value || '';
  var lot     = (document.getElementById('a-lot') || {}).value || '';
  var qcResult= (document.getElementById('a-qc') || {}).value || '';
  if (!actor) { showToast('実施者名を入力してください'); return; }
  var res = await gasCall('sdAdvance', { progressId: progressId, actor: actor, comment: comment, lotNumber: lot, qcResult: qcResult });
  if (res.success) {
    showToast(res.completed ? '🎉 フロー完了！' : res.result === 'ng_returned' ? '❌ QC不合格 差し戻しました' : '✅ ボールを渡しました');
    closeModal('detail-modal');
    await loadAll();
  } else { showToast('エラー: ' + res.error); }
}

async function holdBoard(progressId) {
  var actor = (document.getElementById('a-actor') || {}).value || '担当者';
  var res = await gasCall('sdUpdateBoardStatus', { progressId: progressId, status: '保留', actor: actor });
  if (res.success) { showToast('保留にしました'); closeModal('detail-modal'); await loadAll(); }
}

// ===== 新規登録 =====
function openNewModal() { document.getElementById('new-modal').classList.add('open'); }
async function submitNew() {
  var mcode = document.getElementById('n-mcode').value.trim();
  var bid   = document.getElementById('n-bid').value.trim();
  var btype = document.getElementById('n-btype').value;
  var flow  = document.getElementById('n-flow').value;
  if (!mcode || !bid || !btype || !flow) { showToast('必須項目を入力してください'); return; }
  var res = await gasCall('sdCreateBoardProgress', {
    modelCode: mcode, modelName: document.getElementById('n-mname').value.trim(),
    boardId: bid, boardType: btype, flowType: flow,
    priority: document.getElementById('n-pri').value,
    quoteNo: document.getElementById('n-quote').value.trim(),
    orderNo: document.getElementById('n-order').value.trim(),
    deliveryDate: document.getElementById('n-deliv').value,
    clientName: document.getElementById('n-client').value.trim(),
    actor: document.getElementById('n-actor').value.trim() || 'システム',
    memo: document.getElementById('n-memo').value.trim(),
  });
  if (res.success) {
    showToast('✅ 登録完了: ' + res.progressId);
    closeModal('new-modal');
    await loadAll();
  } else { showToast('エラー: ' + res.error); }
}

function showPage(p) {
  document.querySelectorAll('.page').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('page-' + p).classList.add('active');
  event.currentTarget.classList.add('active');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showToast(msg) {
  var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.onload = function() { loadAll(); setInterval(loadAll, 300000); };
</script>
