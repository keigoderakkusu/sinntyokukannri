<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>業務フロー進捗管理 v2</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ===== RESET & TOKENS ===== */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080d18;--surf:#0f1826;--surf2:#162034;--surf3:#1c2a44;
  --bdr:#1d2d48;--bdr2:#253858;--bdr3:#2d4570;
  --tx:#dde6f0;--tx2:#5e7a9a;--tx3:#8ba3bf;
  --acc:#3b82f6;--grn:#10b981;--amb:#f59e0b;--red:#ef4444;--pur:#8b5cf6;
  --font:'IBM Plex Sans JP',sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --hh:52px;--sw:256px;--r:8px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--tx);font-size:13px;}
button{font-family:var(--font);cursor:pointer;}
input,textarea,select{font-family:var(--font);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bdr3);border-radius:4px;}

/* ===== ANIMATIONS ===== */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes slide{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes ripple{0%{outline:3px solid var(--grn);outline-offset:0}100%{outline:3px solid transparent;outline-offset:8px}}
@keyframes toastin{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}15%,80%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-6px)}}

/* ===== LAYOUT ===== */
#app{display:flex;flex-direction:column;height:100vh;}

/* ─── HEADER ─── */
#hdr{
  height:var(--hh);flex-shrink:0;
  background:linear-gradient(90deg,#050a14,#0f1826);
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;padding:0 14px;gap:10px;z-index:600;
}
.hdr-logo{font-size:18px;}
.hdr-title{color:var(--tx);font-weight:700;font-size:14px;}
.hdr-badge{
  color:#38bdf8;font-weight:700;font-size:10px;
  background:#0ea5e913;border:1px solid #0ea5e930;
  border-radius:5px;padding:2px 8px;
}
.sep{flex:1;}
.hdr-pill{
  display:flex;align-items:center;gap:5px;
  background:var(--surf2);border:1px solid var(--bdr);
  border-radius:20px;padding:3px 11px;
  font-size:10px;font-weight:700;
}
.dot{width:7px;height:7px;border-radius:50%;background:var(--tx2);}
.dot.on{background:var(--grn);animation:pulse 1.5s infinite;}
.btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 12px;border:none;border-radius:6px;
  color:#fff;font-size:10px;font-weight:700;transition:all .15s;
}
.btn-blue{background:var(--acc);}
.btn-blue:hover{background:#2563eb;}
.btn-gray{background:var(--surf2);border:1px solid var(--bdr);color:var(--tx3);}
.btn-green{background:var(--grn);}
.btn-red{background:var(--red);}
.btn-toggle{
  padding:4px 12px;border-radius:20px;
  background:var(--surf2);border:1px solid var(--bdr);
  color:var(--tx2);font-size:10px;font-weight:700;transition:all .2s;
}
.btn-toggle.on{background:#10b98118;border-color:#10b98140;color:var(--grn);}
.spin{animation:spin 1s linear infinite;display:inline-block;}

/* ─── BODY ─── */
#body{flex:1;display:flex;overflow:hidden;}

/* ===== LEFT SIDEBAR ===== */
#side{
  width:var(--sw);flex-shrink:0;
  background:var(--surf);border-right:1px solid var(--bdr);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .25s;
}
#side.collapsed{width:0;overflow:hidden;}

.side-tabs{display:flex;background:var(--bg);flex-shrink:0;border-bottom:1px solid var(--bdr);}
.stab{
  flex:1;padding:8px 2px;border:none;background:transparent;
  color:var(--tx2);font-size:9px;font-weight:700;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;
}
.stab.on{background:var(--surf);color:var(--tx);border-bottom-color:var(--acc);}
.stab:hover:not(.on){color:var(--tx3);}

.side-scroll{overflow-y:auto;flex:1;}
.side-row{
  padding:9px 12px;border-bottom:1px solid var(--bg);
  display:flex;align-items:center;gap:8px;transition:background .1s;
}
.side-row:hover{background:var(--surf2);}
.side-ico{font-size:15px;flex-shrink:0;}
.side-info{flex:1;min-width:0;}
.side-lbl{font-weight:700;font-size:11px;}
.side-sub{font-size:9px;color:var(--tx2);margin-top:1px;}
.side-badge{
  border-radius:50%;width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:11px;flex-shrink:0;color:#fff;transition:all .3s;
}

/* ===== CONSOLE (管理タブ) ===== */
.csec{border-bottom:1px solid var(--bdr);}
.chdr{
  padding:9px 12px;display:flex;align-items:center;gap:6px;
  cursor:pointer;user-select:none;
  font-size:10px;font-weight:700;color:var(--tx3);
  background:var(--surf2);transition:background .1s;
}
.chdr:hover{background:var(--bdr);}
.chdr .arr{margin-left:auto;font-size:9px;transition:transform .2s;}
.chdr.open .arr{transform:rotate(180deg);}
.cbdy{display:none;padding:10px 12px;}
.cbdy.open{display:block;}

.ctbl{width:100%;border-collapse:collapse;}
.ctbl th{
  font-size:9px;color:var(--tx2);font-weight:700;
  padding:3px 5px;text-align:left;border-bottom:1px solid var(--bdr);
  letter-spacing:.5px;text-transform:uppercase;
}
.ctbl td{
  padding:4px 5px;font-size:11px;border-bottom:1px solid var(--bdr)0a;
  vertical-align:middle;
}
.ctbl tr:hover td{background:var(--surf2);}

/* inline edit */
.editable{
  cursor:text;border-radius:4px;padding:2px 4px;
  display:inline-block;min-width:40px;transition:background .12s;outline:none;
}
.editable:hover{background:var(--bdr);}
.editable:focus{background:var(--surf3);box-shadow:0 0 0 2px var(--acc);}

/* toggle switch */
.tog{
  position:relative;width:26px;height:15px;
  background:var(--bdr2);border-radius:8px;cursor:pointer;flex-shrink:0;
  transition:background .2s;
}
.tog.on{background:var(--acc);}
.tog::after{
  content:'';position:absolute;top:2px;left:2px;
  width:11px;height:11px;border-radius:50%;
  background:#fff;transition:transform .2s;
}
.tog.on::after{transform:translateX(11px);}
.tog-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.tog-lbl{font-size:10px;color:var(--tx3);}

/* inline inputs */
.ii{
  width:100%;background:var(--surf2);border:1px solid var(--bdr2);
  border-radius:5px;padding:5px 8px;color:var(--tx);font-size:11px;
}
.ii:focus{outline:none;border-color:var(--acc);}
.isel{
  background:var(--surf2);border:1px solid var(--bdr2);
  border-radius:5px;padding:3px 5px;color:var(--tx);font-size:10px;
}
.add-btn{
  padding:6px 12px;font-size:10px;color:var(--acc);
  cursor:pointer;display:flex;align-items:center;gap:4px;
  transition:background .1s;
}
.add-btn:hover{background:var(--surf2);}

/* ===== FLOW AREA ===== */
#flow-area{
  flex:1;overflow:auto;
  background:var(--bg);
  background-image:radial-gradient(circle,var(--surf2) 1px,transparent 1px);
  background-size:22px 22px;
}
#flow-canvas{padding:14px 18px 60px;min-width:max-content;}

.stage-hdrs{display:flex;gap:8px;margin-bottom:10px;}
.stage-hdr{
  width:200px;flex-shrink:0;padding:6px 0;text-align:center;
  border-radius:7px;font-size:11px;font-weight:700;color:#fff;letter-spacing:.5px;
}
.lane-wrap{margin-bottom:8px;}
.lane-meta{display:flex;align-items:center;gap:6px;padding:3px 2px 5px;}
.lm-ico{font-size:13px;}
.lm-lbl{font-weight:700;font-size:11px;}
.lm-cnt{border-radius:20px;padding:1px 9px;font-size:10px;font-weight:800;color:#fff;}
.lane{display:flex;gap:8px;border-radius:9px;border:1.5px solid transparent;padding:7px;}
.lane-col{width:200px;flex-shrink:0;min-height:110px;display:flex;flex-direction:column;gap:7px;}

/* ===== CARD ===== */
.card{
  border-radius:9px;border:2px solid transparent;
  overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;
  animation:slide .22s ease;
}
.card:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.5);}
.card.ripple{animation:ripple .6s ease;}
.card-top{
  padding:3px 9px;font-size:10px;font-weight:700;
  color:#fff;display:flex;justify-content:space-between;align-items:center;
}
.card-body{padding:8px 9px 7px;}
.card-client{
  font-weight:700;font-size:12px;color:#1e293b;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;
}
.card-no{color:#64748b;font-size:9px;font-family:var(--mono);margin-bottom:4px;}
.card-pills{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px;}
.pill{border-radius:20px;padding:1px 6px;font-size:9px;font-weight:700;}
.prog-bg{background:#dde6f0;border-radius:2px;height:3px;margin-bottom:4px;}
.prog-bar{height:100%;border-radius:2px;transition:width .6s;}
.card-foot{display:flex;justify-content:space-between;font-size:9px;color:#64748b;}
.card-mach{max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;}
.card-memo{
  margin-top:3px;font-size:9px;color:#64748b;
  background:#f1f5f9;border-radius:3px;padding:1px 5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-files{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
.fchip{
  display:inline-flex;align-items:center;gap:2px;
  background:#e0e7ff;color:#3730a3;
  border-radius:3px;padding:1px 5px;font-size:8px;font-weight:600;
}

/* ===== OVERLAY / MODAL ===== */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(4,8,20,.8);z-index:2000;
  align-items:flex-start;justify-content:center;
  padding:16px;overflow-y:auto;backdrop-filter:blur(4px);
}
.overlay.open{display:flex;}
.modal{
  background:var(--surf);border-radius:14px;
  width:100%;max-width:530px;margin:auto;
  box-shadow:0 32px 80px rgba(0,0,0,.9);
  border:1px solid var(--bdr2);animation:slide .2s ease;
}
.mhdr{
  padding:15px 18px;display:flex;
  justify-content:space-between;align-items:flex-start;
  border-radius:13px 13px 0 0;color:#fff;
}
.mhdr-info .msub{font-size:10px;opacity:.75;}
.mhdr-info .mmain{font-size:17px;font-weight:700;margin-top:3px;}
.mhdr-info .msub2{font-size:11px;opacity:.6;margin-top:2px;}
.mclose{
  background:rgba(255,255,255,.12);border:none;color:#fff;
  font-size:17px;cursor:pointer;border-radius:50%;
  width:27px;height:27px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;transition:background .15s;
}
.mclose:hover{background:rgba(255,255,255,.25);}
.mbody{padding:15px;}
.msec{margin-bottom:13px;}
.msec-t{
  font-size:9px;color:var(--tx2);font-weight:700;
  margin-bottom:7px;letter-spacing:.6px;text-transform:uppercase;
}

/* loc box */
.locbox{
  border-radius:9px;padding:10px 13px;
  display:flex;align-items:center;gap:10px;margin-bottom:13px;
}
.loc-ico{font-size:22px;}
.loc-dept{font-weight:700;font-size:13px;}
.loc-stage{font-size:10px;color:var(--tx2);margin-top:2px;}
.loc-pct{font-weight:700;font-size:14px;}
.loc-psub{font-size:9px;color:var(--tx2);}

/* status grid */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.sbtn{
  padding:8px 9px;border-radius:7px;
  border:2px solid var(--bdr);background:var(--surf2);
  color:var(--tx2);font-size:10px;font-weight:700;
  cursor:pointer;text-align:left;transition:all .13s;
  font-family:var(--font);
}

/* form */
.mi{
  width:100%;padding:9px 11px;border-radius:7px;
  border:1px solid var(--bdr2);background:#05090f;
  color:var(--tx);font-size:13px;font-family:var(--font);transition:border-color .13s;
}
.mi:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px #3b82f618;}
.mta{
  width:100%;padding:9px 11px;border-radius:7px;
  border:1px solid var(--bdr2);background:#05090f;
  color:var(--tx);font-size:12px;font-family:var(--font);resize:none;transition:border-color .13s;
}
.mta:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px #3b82f618;}
.msel{
  width:100%;padding:9px 11px;border-radius:7px;
  border:1px solid var(--bdr2);background:#05090f;
  color:var(--tx);font-size:13px;font-family:var(--font);
}
.msel:focus{outline:none;border-color:var(--acc);}

/* file area */
.fdrop{
  border:2px dashed var(--bdr2);border-radius:9px;padding:18px;
  text-align:center;cursor:pointer;transition:all .2s;background:var(--surf2);
  margin-top:8px;
}
.fdrop:hover,.fdrop.drag{border-color:var(--acc);background:#3b82f608;}
.fdrop-ico{font-size:26px;margin-bottom:5px;}
.fdrop-t{font-size:11px;color:var(--tx3);}
.fdrop-s{font-size:10px;color:var(--tx2);margin-top:3px;}
.ftype-row{display:flex;justify-content:center;gap:4px;margin-top:8px;flex-wrap:wrap;}
.fbadge{padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;}

.flist{margin-top:8px;display:flex;flex-direction:column;gap:5px;}
.fitem{
  display:flex;align-items:center;gap:8px;
  background:var(--surf2);border-radius:7px;
  padding:7px 10px;border:1px solid var(--bdr);animation:slide .2s;
}
.fitem-ico{font-size:18px;flex-shrink:0;}
.fitem-info{flex:1;min-width:0;}
.fitem-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fitem-meta{font-size:9px;color:var(--tx2);margin-top:1px;}
.fitem-st{font-size:9px;font-weight:700;flex-shrink:0;}
.fitem-acts{display:flex;gap:3px;flex-shrink:0;}
.fac-btn{
  background:none;border:none;cursor:pointer;
  font-size:14px;padding:2px 3px;border-radius:4px;line-height:1;
  transition:background .1s;
}
.fac-btn:hover{background:var(--bdr);}
.fbar{height:2px;background:var(--bdr);border-radius:1px;margin-top:3px;}
.fbar-fill{height:100%;border-radius:1px;background:var(--acc);transition:width .3s;}

/* submit */
.msubmit{
  width:100%;padding:13px;border:none;border-radius:9px;
  color:#fff;font-size:14px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.msubmit:disabled{background:var(--surf2) !important;cursor:not-allowed;color:var(--tx2);}
.mnote{margin-top:7px;text-align:center;color:var(--tx2);font-size:10px;}

/* TOAST */
#toast{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);
  background:var(--grn);color:#fff;border-radius:20px;
  padding:5px 18px;font-size:11px;font-weight:700;
  pointer-events:none;z-index:9999;white-space:nowrap;
  animation:toastin 3s ease forwards;
}

@media(max-width:640px){
  #side{display:none;}
  .modal{max-width:100%;}
}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<div id="hdr">
  <span class="hdr-logo">📊</span>
  <div class="hdr-title">業務フロー進捗管理</div>
  <div class="hdr-badge">× VR3</div>
  <div class="sep"></div>
  <div class="hdr-pill">
    <div id="cdot" class="dot"></div>
    <span id="clbl" style="color:var(--tx2)">デモ</span>
  </div>
  <button class="btn-toggle" id="bpoll" onclick="togglePoll()">🔄 自動更新ON</button>
  <button class="btn btn-blue" style="padding:5px 10px;font-size:10px" onclick="manualSync()">
    <span id="sync-ic">🔄</span><span id="sync-lb">同期</span>
  </button>
  <span id="lsync" style="color:var(--bdr3);font-size:9px;white-space:nowrap"></span>
  <button class="btn btn-gray" style="padding:5px 8px;font-size:16px;line-height:1" onclick="toggleSide()" title="サイドバー">☰</button>
</div>

<!-- BODY -->
<div id="body">
  <!-- SIDEBAR -->
  <div id="side">
    <div class="side-tabs">
      <button class="stab on"  onclick="setTab('dept')">🏢部署</button>
      <button class="stab"     onclick="setTab('person')">👤担当</button>
      <button class="stab"     onclick="setTab('console')">⚙管理</button>
      <button class="stab"     onclick="setTab('files')">📁ファイル</button>
    </div>
    <div class="side-scroll" id="side-content"></div>
  </div>

  <!-- FLOW -->
  <div id="flow-area">
    <div id="flow-canvas">
      <div class="stage-hdrs" id="stage-hdrs"></div>
      <div id="lanes"></div>
    </div>
  </div>
</div>
</div>

<!-- ORDER MODAL -->
<div class="overlay" id="omodal" onclick="bgClose(event,'omodal')">
<div class="modal">
  <div class="mhdr" id="mhdr">
    <div class="mhdr-info">
      <div class="msub" id="msub"></div>
      <div class="mmain" id="mmain"></div>
      <div class="msub2" id="msub2"></div>
    </div>
    <button class="mclose" onclick="closeModal('omodal')">✕</button>
  </div>
  <div class="mbody">

    <!-- ボールの場所 -->
    <div class="locbox" id="locbox">
      <div class="loc-ico" id="lic"></div>
      <div style="flex:1">
        <div class="loc-dept" id="ldept"></div>
        <div class="loc-stage" id="lstage"></div>
      </div>
      <div style="text-align:right">
        <div class="loc-pct" id="lpct"></div>
        <div class="loc-psub">進捗</div>
      </div>
    </div>

    <!-- ステータス -->
    <div class="msec">
      <div class="msec-t">📍 ステータス（変更で全員即反映）</div>
      <div class="sgrid" id="sgrid"></div>
    </div>

    <!-- 担当者 -->
    <div class="msec">
      <div class="msec-t">👤 担当者</div>
      <input class="mi" id="massignee" placeholder="担当者名">
    </div>

    <!-- カスタムフィールド（管理コンソールで設定） -->
    <div id="mcf"></div>

    <!-- メモ -->
    <div class="msec">
      <div class="msec-t">📝 メモ</div>
      <textarea class="mta" id="mmemo" rows="3" placeholder="作業メモ・連絡事項"></textarea>
    </div>

    <!-- ファイル添付 -->
    <div class="msec">
      <div class="msec-t">📎 ファイル添付（Google Driveに自動保存）</div>
      <div class="ftype-row">
        <span class="fbadge" style="background:#e0e7ff;color:#3730a3">📄 見積書</span>
        <span class="fbadge" style="background:#dcfce7;color:#166534">📋 注文書</span>
        <span class="fbadge" style="background:#fef9c3;color:#854d0e">🔧 部品表</span>
        <span class="fbadge" style="background:#fce7f3;color:#9d174d">📐 仕様書</span>
        <span class="fbadge" style="background:#f3e8ff;color:#6b21a8">📑 その他</span>
      </div>
      <div class="fdrop" id="fdrop"
        ondragover="fdragover(event)" ondragleave="fdragleave(event)" ondrop="fdrop_ev(event)"
        onclick="document.getElementById('finput').click()">
        <div class="fdrop-ico">📁</div>
        <div class="fdrop-t">クリック または ドラッグ＆ドロップ</div>
        <div class="fdrop-s">PDF・Word・Excel・画像・ZIP｜最大50MB</div>
      </div>
      <input type="file" id="finput" multiple
        accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg,.zip,.txt,.csv"
        style="display:none" onchange="fselect(event)">
      <div class="flist" id="flist"></div>
    </div>

    <!-- 送信 -->
    <button class="msubmit" id="msubmit" onclick="submitOrder()">✅ 全員の画面に反映する</button>
    <div class="mnote">Googleスプレッドシート・Driveに直接保存。外部サービス不要。</div>
  </div>
</div>
</div>

<script>
/* ============================================================
   GAS通信
============================================================ */
const GAS_URL = (typeof google!=='undefined'&&google.script)
  ? null
  : 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec';

function gasCall(action,params,cb){
  if(GAS_URL===null&&typeof google!=='undefined'){
    google.script.run
      .withSuccessHandler(cb)
      .withFailureHandler(e=>cb({success:false,error:e.message}))
      .handleApiRequest(action,params||{});
    return;
  }
  const u=new URL(GAS_URL);
  u.searchParams.set('action',action);
  if(params)Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,String(v)));
  fetch(u.toString()).then(r=>r.json()).then(cb).catch(()=>cb({success:false}));
}

/* ============================================================
   データ取得
============================================================ */
function fetchOrders(quiet){
  if(!quiet)setSyncing(true);
  gasCall('boardGetOrders',{},function(r){
    let ok=r&&r.success&&r.items&&r.items.length;
    if(ok){
      orders=r.items.map(norm);
      gasCall('getFiles',{},function(fr){
        if(fr&&fr.success&&fr.files){
          orders.forEach(o=>{o.files=(fr.files[o.mgmtId]||o.files||[]);});
        }
        connected=true;finish();
      });
    } else {
      gasCall('getAll',{},function(r2){
        if(r2&&r2.success&&r2.items&&r2.items.length){orders=r2.items.map(norm);connected=true;}
        else if(!connected){orders=MOCK.map(norm);}
        finish();
      });
    }
    function finish(){renderAll();updateHdr();setLsync();if(!quiet)setSyncing(false);countdown=CFG.pollSec;}
  });
}

/* ============================================================
   ポーリング
============================================================ */
function startPoll(){
  clearInterval(pollTimer);clearInterval(cntTimer);
  countdown=CFG.pollSec;
  pollTimer=setInterval(()=>{fetchOrders(true);countdown=CFG.pollSec;},CFG.pollSec*1000);
  cntTimer=setInterval(()=>{
    countdown=Math.max(0,countdown-1);
    if(connected){const e=document.getElementById('clbl');if(e)e.textContent=`GAS接続 (${countdown}s)`;}
  },1000);
}
function stopPoll(){clearInterval(pollTimer);clearInterval(cntTimer);}
function togglePoll(){
  CFG.polling=!CFG.polling;
  const b=document.getElementById('bpoll');
  if(CFG.polling){startPoll();b.className='btn-toggle on';b.textContent='🔄 自動更新ON';}
  else{stopPoll();b.className='btn-toggle';b.textContent='⏸ 自動更新OFF';}
}
function manualSync(){fetchOrders(false);}
function setSyncing(v){
  const i=document.getElementById('sync-ic'),l=document.getElementById('sync-lb');
  if(i){i.className=v?'spin':'';i.textContent='🔄';}
  if(l)l.textContent=v?'同期中':'同期';
}
function setLsync(){const e=document.getElementById('lsync');if(e)e.textContent=new Date().toLocaleTimeString('ja-JP');}
function updateHdr(){
  const d=document.getElementById('cdot'),l=document.getElementById('clbl');
  if(connected){if(d)d.className='dot on';if(l){l.textContent=`GAS接続 (${countdown}s)`;l.style.color='#10b981';}}
  else{if(d)d.className='dot';if(l){l.textContent='デモ';l.style.color='var(--tx2)';}}
}

function di(status){return(CFG.statusMap[status]||{}).di||'sales';}
function si(status){return(CFG.statusMap[status]||{}).si??0;}
function meta(status){return CFG.statusMap[status]||CFG.statusMap['作成予定'];}
function dept(id){return CFG.depts.find(d=>d.id===id)||CFG.depts[0];}

function renderStageHdrs(){
  document.getElementById('stage-hdrs').innerHTML=
    CFG.stages.filter(s=>s.active).map(s=>
      `<div class="stage-hdr" style="background:${s.color};box-shadow:0 4px 14px ${s.color}55">${s.label}</div>`
    ).join('');
}

function renderLanes(){
  const el=document.getElementById('lanes');
  const as=CFG.stages.filter(s=>s.active);
  const grid={};
  CFG.depts.filter(d=>d.active).forEach(d=>{
    grid[d.id]={};as.forEach((_,i)=>{grid[d.id][i]=[];});
  });
  orders.forEach(o=>{
    const did=di(o.status),sIdx=si(o.status);
    if(grid[did]&&grid[did][sIdx]!==undefined)grid[did][sIdx].push(o);
  });
  el.innerHTML=CFG.depts.filter(d=>d.active).map(d=>{
    const cnt=orders.filter(o=>di(o.status)===d.id).length;
    const glow=cnt>0?`box-shadow:0 0 12px ${d.color}88`:'';
    const cols=as.map((_,i)=>`<div class="lane-col">${(grid[d.id][i]||[]).map(o=>cardHtml(o,d)).join('')}</div>`).join('');
    return`<div class="lane-wrap">
      <div class="lane-meta">
        <span class="lm-ico">${d.icon}</span>
        <span class="lm-lbl" style="color:${d.color}">${esc(d.label)}</span>
        <span class="lm-cnt" style="background:${d.color};${glow}">${cnt}件</span>
      </div>
      <div class="lane" style="border-color:${d.color}22;background:${d.color}07">${cols}</div>
    </div>`;
  }).join('');
}

  const mach=(o.machineName||o.modelCode||'').substring(0,14);
  const filesArr=o.files||[];
  return`<div class="card" id="card-${o.mgmtId}"
    style="border-color:${m.color};background:${m.bg}"
    onclick="openModal('${o.mgmtId}')">
    <div class="card-top" style="background:${g}">
      <span>${d.icon} ${esc(d.label)}</span>
      ${df.assignee?.show?`<span>👤 ${esc(o.assignee||'未設定')}</span>`:''}
    </div>
    <div class="card-body">
      ${df.client?.show?`<div class="card-client">${esc(o.client)}</div>`:''}
      ${df.orderNo?.show?`<div class="card-no">${esc(o.orderNo)}</div>`:''}
      <div class="card-pills">
        ${df.status?.show?`<span class="pill" style="background:${m.color}22;color:${m.color}">${m.icon} ${o.status}</span>`:''}
        ${df.type?.show&&o.orderType?`<span class="pill" style="background:var(--surf3);color:var(--tx3)">${esc(o.orderType)}</span>`:''}
      </div>
      <div class="prog-bg">
        <div class="prog-bar" style="width:${m.pct}%;background:${g}"></div>
      </div>
      <div class="card-foot">
        ${df.amount?.show?`<span>${amt}</span>`:'<span></span>'}
        ${df.machine?.show?`<span class="card-mach">${esc(mach)}</span>`:''}
      </div>
      ${df.memo?.show&&o.memo?`<div class="card-memo">📝 ${esc(o.memo)}</div>`:''}
      ${df.files?.show&&filesArr.length?`<div class="card-files">${filesArr.slice(0,3).map(f=>`<span class="fchip">${fileIco(f.type||ext(f.name))} ${esc(f.name.substring(0,8))}</span>`).join('')}${filesArr.length>3?`<span class="fchip">+${filesArr.length-3}</span>`:''}</div>`:''}

  tab=t;
  document.querySelectorAll('.stab').forEach((el,i)=>{
    el.className='stab'+(['dept','person','console','files'][i]===t?' on':'');
  });

}

function renderSide(){
  const el=document.getElementById('side-content');
  if(tab==='dept')el.innerHTML=deptTabHtml();
  else if(tab==='person')el.innerHTML=personTabHtml();
  else if(tab==='console')el.innerHTML=consoleTabHtml();
  else if(tab==='files')el.innerHTML=filesTabHtml();
}

function deptTabHtml(){
  const byD={};CFG.depts.forEach(d=>{byD[d.id]={n:0,amt:0};});
  orders.forEach(o=>{const d=di(o.status);byD[d].n++;byD[d].amt+=o.orderAmount;});
  return CFG.depts.filter(d=>d.active).map(d=>{
    const info=byD[d.id]||{n:0,amt:0};
    return`<div class="side-row">
      <span class="side-ico">${d.icon}</span>
      <div class="side-info">
        <div class="side-lbl" style="color:${d.color}">${esc(d.label)}</div>
        ${info.amt>0?`<div class="side-sub">¥${info.amt.toLocaleString()}</div>`:''}
      </div>
      <div class="side-badge" style="background:${info.n>0?d.color:'#334155'};${info.n>0?`box-shadow:0 0 10px ${d.color}88`:''}">${info.n}</div>
    </div>`;
  }).join('');
}

function personTabHtml(){
  const byP={};
  orders.forEach(o=>{
    const n=o.assignee||'未設定';
    if(!byP[n])byP[n]={n:0,di:di(o.status)};
    byP[n].n++;byP[n].di=di(o.status);
  });
  return Object.entries(byP).sort((a,b)=>b[1].n-a[1].n).map(([name,info])=>{
    const d=dept(info.di);
    return`<div class="side-row">
      <div style="width:27px;height:27px;border-radius:50%;background:linear-gradient(135deg,${d.color},${d.color}88);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0">${name[0]}</div>
      <div class="side-info">
        <div class="side-lbl" style="color:var(--tx)">${esc(name)}</div>
        <div class="side-sub" style="color:${d.color}">${d.icon} ${esc(d.label)}</div>

      <div class="side-badge" style="background:${d.color};width:22px;height:22px;font-size:10px">${info.n}</div>
    </div>`;
  }).join('');
}

          <span style="font-size:10px;color:var(--tx2)">秒ごと</span>
        </div>
      </div>
      <div class="tog-row"><div class="tog ${CFG.notifications.onStatus?'on':''}" onclick="tnotif('onStatus')"></div><span class="tog-lbl">ステータス変更を通知</span></div>
      <div class="tog-row"><div class="tog ${CFG.notifications.onFile?'on':''}" onclick="tnotif('onFile')"></div><span class="tog-lbl">ファイル追加を通知</span></div>
      <div class="tog-row"><div class="tog ${CFG.notifications.telegram?'on':''}" onclick="tnotif('telegram')"></div><span class="tog-lbl">Telegram通知（VR3連携）</span></div>
    </div>
  </div>

  <!-- Drive設定 -->
  <div class="csec">
    <div class="chdr" onclick="toggleCs(this)">📁 Google Drive設定<span class="arr">▼</span></div>
    <div class="cbdy">
      <div style="font-size:10px;color:var(--tx2);margin-bottom:4px">保存フォルダ名</div>
      <input class="ii" value="${esc(CFG.drive.folder)}" onblur="CFG.drive.folder=this.value;saveCfg()">
      ${CFG.drive.folderId?`<div style="font-size:9px;color:var(--grn);margin-top:5px">✓ フォルダID: ${CFG.drive.folderId}</div>`:'<div style="font-size:9px;color:var(--tx2);margin-top:4px">GASが自動作成します</div>'}
    </div>
  </div>

  <div style="padding:12px">
    <button class="btn btn-green" style="width:100%" onclick="saveCfg()">💾 設定を保存</button>
  </div>`;
}

function filesTabHtml(){
  const all=[];
  orders.forEach(o=>(o.files||[]).forEach(f=>all.push({...f,client:o.client,orderNo:o.orderNo,mgmtId:o.mgmtId})));
  if(!all.length)return`<div style="padding:24px;text-align:center;color:var(--tx2)"><div style="font-size:32px;margin-bottom:8px">📁</div><div style="font-size:12px">添付ファイルなし</div><div style="font-size:10px;margin-top:4px">カードをタップして添付</div></div>`;
  return all.map(f=>`<div class="side-row" style="cursor:pointer" onclick="openUrl('${f.url||'#'}')">
    <span class="side-ico">${fileIco(f.type||ext(f.name))}</span>
    <div class="side-info">
      <div class="side-lbl" style="color:var(--tx);font-size:10px">${esc(f.name)}</div>
      <div class="side-sub">${esc(f.orderNo)} / ${esc(f.client)}</div>
      <div class="side-sub">${f.size||''}</div>
    </div>
    <span style="color:var(--tx2);font-size:16px">↗</span>
  </div>`).join('');
}

/* ============================================================
   管理コンソール操作
============================================================ */
function toggleCs(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function save(arr,i,k,v){CFG[arr][i][k]=typeof v==='string'?v.trim():v;saveCfg();renderAll();}
function tdept(i){CFG.depts[i].active=!CFG.depts[i].active;saveCfg();renderAll();renderSide();}
function tstage(i){CFG.stages[i].active=!CFG.stages[i].active;saveCfg();renderAll();renderSide();}
function tcf(i){CFG.customFields[i].active=!CFG.customFields[i].active;saveCfg();renderSide();}
function tdisp(k){CFG.dispFields[k].show=!CFG.dispFields[k].show;saveCfg();renderAll();renderSide();}
function tnotif(k){CFG.notifications[k]=!CFG.notifications[k];saveCfg();renderSide();}
function savecf(i,k,v){CFG.customFields[i][k]=typeof v==='string'?v.trim():v;saveCfg();}
function saveSM(s,k,v){CFG.statusMap[s][k]=v;saveCfg();renderAll();}
function setPollSec(v){CFG.pollSec=Math.max(3,Math.min(300,Number(v)));if(CFG.polling){stopPoll();startPoll();}saveCfg();}
function editIcon(arr,i){
  const v=prompt('絵文字アイコン:',CFG[arr][i].icon);
  if(v){CFG[arr][i].icon=v.trim();saveCfg();renderAll();renderSide();}
}
function delItem(arr,i){
  if(!confirm('削除しますか?'))return;
  CFG[arr].splice(i,1);saveCfg();renderAll();renderSide();
}
function addDept(){
  const l=prompt('新しい部署名:');if(!l)return;
  CFG.depts.push({id:'d'+Date.now(),label:l.trim(),color:'#64748b',icon:'🏢',active:true});
  saveCfg();renderAll();renderSide();
}
function addStage(){
  const l=prompt('新しいステージ名:');if(!l)return;
  CFG.stages.push({label:l.trim(),deptId:'sales',color:'#64748b',active:true});
  saveCfg();renderAll();renderSide();
}
function addCF(){
  const l=prompt('フィールド名:');if(!l)return;
  CFG.customFields.push({id:'cf'+Date.now(),label:l.trim(),type:'text',options:[],active:true});
  saveCfg();renderSide();
}
function saveCfg(){
  gasCall('saveConfig',{config:JSON.stringify(CFG)},function(r){
    if(r&&r.success)toast('設定を保存しました');
  });
}

/* ============================================================
   注文モーダル
============================================================ */
function openModal(mgmtId){
  const o=orders.find(x=>x.mgmtId===mgmtId);if(!o)return;
  curOrder=o;curStatus=o.status;pendingFiles=[];
  const m=meta(o.status),d=dept(m.di);
  const hdr=document.getElementById('mhdr');
  hdr.style.background=`linear-gradient(135deg,${d.color},${m.color})`;
  document.getElementById('msub').textContent=`${o.orderNo} / ${o.orderType}`;
  document.getElementById('mmain').textContent=o.client;
  document.getElementById('msub2').textContent=o.machineName||o.modelCode||'';
  updLocBox(m,d);
  renderSGrid();
  document.getElementById('massignee').value=o.assignee||'';
  document.getElementById('mmemo').value=o.memo||'';
  renderCFields(o);
  renderFList(o.files||[]);
  document.getElementById('omodal').className='overlay open';
}

function updLocBox(m,d){
  const b=document.getElementById('locbox');
  b.style.background=d.color+'18';b.style.border=`1px solid ${d.color}33`;
  document.getElementById('lic').textContent=d.icon;
  const ld=document.getElementById('ldept');ld.textContent=`ボールは ${d.label} にあります`;ld.style.color=d.color;
  document.getElementById('lstage').textContent=`${CFG.stages[m.si]?.label||''} フェーズ / 進捗 ${m.pct}%`;
  const lp=document.getElementById('lpct');lp.textContent=`${m.pct}%`;lp.style.color=d.color;
}

function renderSGrid(){
  document.getElementById('sgrid').innerHTML=Object.entries(CFG.statusMap).map(([s,m])=>{
    const sel=s===curStatus;
    return`<button class="sbtn" style="${sel?`border-color:${m.color};background:${m.color}20;color:${m.color}`:''}"
      onclick="selStatus('${s}')">${m.icon} ${s}</button>`;
  }).join('');
}

function selStatus(s){
  curStatus=s;
  const m=meta(s),d=dept(m.di);
  updLocBox(m,d);renderSGrid();
  updSubmitBtn(d,m);
}

function updSubmitBtn(d,m){
  const b=document.getElementById('msubmit');
  b.style.background=`linear-gradient(90deg,${d.color},${m.color})`;
  b.style.boxShadow=`0 4px 16px ${d.color}55`;
}

function renderCFields(o){
  document.getElementById('mcf').innerHTML=CFG.customFields.filter(f=>f.active).map(f=>{
    const v=o['_cf_'+f.id]||'';
    let inp='';
    if(f.type==='select')
      inp=`<select class="msel" id="cf-${f.id}"><option value="">選択してください</option>${(f.options||[]).map(op=>`<option value="${esc(op)}" ${v===op?'selected':''}>${esc(op)}</option>`).join('')}</select>`;
    else if(f.type==='date')
      inp=`<input type="date" class="mi" id="cf-${f.id}" value="${esc(v)}">`;
    else if(f.type==='number')
      inp=`<input type="number" class="mi" id="cf-${f.id}" value="${esc(v)}" placeholder="0">`;
    else
      inp=`<input type="text" class="mi" id="cf-${f.id}" value="${esc(v)}" placeholder="${esc(f.label)}">`;
    return`<div class="msec"><div class="msec-t">${esc(f.label)}</div>${inp}</div>`;
  }).join('');
  // 初期送信ボタン色
  const m=meta(curStatus),d=dept(m.di);updSubmitBtn(d,m);
}

/* ============================================================
   ファイル添付
============================================================ */
function ext(n){return(n||'').split('.').pop().toLowerCase();}
function fileIco(e){
  return{pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',
    png:'🖼',jpg:'🖼',jpeg:'🖼',zip:'🗜',txt:'📃',csv:'📊',
    word:'📝',excel:'📊'}[String(e).toLowerCase()]||'📎';
}
function fmtSz(b){
  if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(0)+'KB';
  return(b/1048576).toFixed(1)+'MB';
}

function renderFList(saved){
  document.getElementById('flist').innerHTML=[
    ...saved.map(f=>fitemHtml(f,'saved')),
    ...pendingFiles.map(f=>fitemHtml(f,'pending')),
  ].join('');
}
function fitemHtml(f,state){
  const ic=fileIco(f.type||ext(f.name));
  const sz=f.size||(f._f?fmtSz(f._f.size):'');
  const st=state==='saved'
    ?`<span class="fitem-st" style="color:var(--grn)">✓ Drive</span>`
    :`<span class="fitem-st" style="color:var(--amb)">⏳ 待機</span>`;
  const openBtn=(f.url&&f.url!=='#')?`<button class="fac-btn" onclick="openUrl('${f.url}')">↗</button>`:'';
  const key=esc((f.name||'').replace(/\s/g,'_'));
  return`<div class="fitem" id="fi-${key}">
    <span class="fitem-ico">${ic}</span>
    <div class="fitem-info">
      <div class="fitem-name">${esc(f.name)}</div>
      <div class="fitem-meta">${sz}</div>
      <div class="fbar" id="fb-${key}" style="display:none"><div class="fbar-fill" style="width:0%"></div></div>
    </div>
    ${st}
    <div class="fitem-acts">${openBtn}<button class="fac-btn" onclick="removeFile('${esc(f.name)}')">🗑</button></div>
  </div>`;
}

function fdragover(e){e.preventDefault();document.getElementById('fdrop').classList.add('drag');}
function fdragleave(){document.getElementById('fdrop').classList.remove('drag');}
function fdrop_ev(e){e.preventDefault();document.getElementById('fdrop').classList.remove('drag');handleFiles(Array.from(e.dataTransfer.files));}
function fselect(e){handleFiles(Array.from(e.target.files));e.target.value='';}
function handleFiles(list){
  list.forEach(f=>{
    if(f.size>52428800){alert(f.name+' は50MBを超えています');return;}
    pendingFiles.push({name:f.name,type:ext(f.name),size:fmtSz(f.size),url:'#',_f:f});
  });
  renderFList(curOrder?.files||[]);
}
function removeFile(name){
  pendingFiles=pendingFiles.filter(f=>f.name!==name);
  if(curOrder){curOrder.files=(curOrder.files||[]).filter(f=>f.name!==name);}
  renderFList(curOrder?.files||[]);
}
function openUrl(u){if(u&&u!=='#')window.open(u,'_blank');}

/* ============================================================
   送信
============================================================ */
function submitOrder(){
  if(!curOrder||saving)return;
  saving=true;
  const btn=document.getElementById('msubmit');
  btn.disabled=true;btn.innerHTML='<span class="spin">⏳</span> 保存中...';

  const mgmtId=curOrder.mgmtId;
  const assignee=document.getElementById('massignee').value;
  const memo=document.getElementById('mmemo').value;
  const cfData={};
  CFG.customFields.filter(f=>f.active).forEach(f=>{
    const el=document.getElementById('cf-'+f.id);
    if(el)cfData['_cf_'+f.id]=el.value;
  });

  // ローカル即時反映
  orders=orders.map(o=>o.mgmtId===mgmtId?{...o,status:curStatus,assignee,memo,...cfData}:o);
  renderAll();
  rippleCard(mgmtId);
  toast(`${curOrder.client} → ${curStatus}`);
  closeModal('omodal');
  saving=false;btn.disabled=false;

  // GASバックグラウンド書き込み
  gasCall('updateMgmt',{mgmtId,status:curStatus,assignee,memo,...cfData},function(){
    gasCall('updateStatus',{mgmtId,newStatus:curStatus},function(){
      if(pendingFiles.length)uploadFiles(mgmtId,pendingFiles);
      setTimeout(()=>fetchOrders(true),1200);
    });
  });
}

function uploadFiles(mgmtId,files){
  files.forEach(fp=>{
    const reader=new FileReader();
    reader.onload=function(e){
      const b64=e.target.result.split(',')[1];
      gasCall('saveFileToDrive',{
        mgmtId,fileName:fp.name,
        mimeType:fp._f.type||'application/octet-stream',
        base64:b64,folderName:CFG.drive.folder,
      },function(r){
        if(r&&r.success){
          const o=orders.find(x=>x.mgmtId===mgmtId);
          if(o){o.files=o.files||[];o.files.push({name:fp.name,type:ext(fp.name),size:fp.size,url:r.url});}
          renderAll();renderSide();
          toast('ファイルをDriveに保存: '+fp.name);
        }
      });
    };
    reader.readAsDataURL(fp._f);
  });
}

function closeModal(id){document.getElementById(id).className='overlay';curOrder=null;pendingFiles=[];}
function bgClose(e,id){if(e.target.classList.contains('overlay'))closeModal(id);}

/* ============================================================
   ユーティリティ
============================================================ */
function rippleCard(id){
  const el=document.getElementById('card-'+id);if(!el)return;
  el.classList.add('ripple');setTimeout(()=>el.classList.remove('ripple'),700);
}
function toast(msg){
  const old=document.getElementById('toast');if(old)old.remove();
  const el=document.createElement('div');el.id='toast';el.textContent='✅ '+msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),3200);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ============================================================
   起動
============================================================ */
window.addEventListener('load',function(){
  // GASから保存済み設定を復元
  gasCall('getConfig',{},function(r){
    if(r&&r.success&&r.config){
      try{
        const s=JSON.parse(r.config);
        ['depts','stages','customFields','dispFields','statusMap','notifications','drive','pollSec'].forEach(k=>{
          if(s[k]!==undefined)CFG[k]=s[k];
        });
      }catch(e){}
    }
    orders=MOCK.map(norm);renderAll();updateHdr();
    fetchOrders(false);
    if(CFG.polling)startPoll();
  });
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal('omodal');});
});
</script>
